<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex / Java Class Diagram</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-main: #0f172a;        
            --bg-sidebar: #1e293b;     
            --primary: #10b981;        
            --danger: #ef4444;
            --text-main: #f1f5f9;
            --border: #334155;
            --highlight: #fbbf24; 
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
        body { display: flex; height: 100vh; width: 100vw; background: var(--bg-main); color: var(--text-main); }

        /* TEXT SELECTION */
        body, #sidebar, #code-tooltip, .class-card { user-select: text; -webkit-user-select: text; }

        /* COLLAPSIBLE SIDEBAR */
        #sidebar { 
            width: 380px; min-width: 380px; background: var(--bg-sidebar); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column; 
            height: 100%; z-index: 20; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidebar.collapsed { width: 0; min-width: 0; transform: translateX(-380px); }

        .sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
        #drop-zone { margin: 15px; padding: 20px; border: 2px dashed var(--primary); border-radius: 12px; text-align: center; color: var(--primary); cursor: pointer; background: rgba(16, 185, 129, 0.05); }

        #registry-list { flex: 1; overflow-y: auto; padding: 10px; }
        .class-card { background: var(--bg-main); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .class-card.active { border-color: var(--highlight); background: rgba(251, 191, 36, 0.05); }
        .class-card.hidden { opacity: 0.6; }

        /* FILE EXPLORER */
        #file-explorer { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); flex-shrink: 0; max-height: 45%; min-height: 0; }
        #file-explorer-header { padding: 8px 12px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        #file-explorer-header span { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; flex: 1; }
        #fe-open-btn { padding: 4px 10px; font-size: 11px; border-radius: 5px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; white-space: nowrap; }
        #fe-open-btn:hover { background: var(--primary); color: #fff; }
        #fe-fallback { display: none; }
        #fe-folder-path { padding: 4px 10px 6px; display: none; flex-direction: column; gap: 3px; }
        #fe-folder-path-label { font-size: 10px; color: #64748b; display: flex; align-items: center; gap: 5px; }
        #fe-folder-path-label i { color: #f59e0b; }
        #fe-folder-path-label span { flex: 1; }
        #fe-reopen-btn, #history-btn { padding: 2px 7px; font-size: 10px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: #64748b; cursor: pointer; white-space: nowrap; }
        #fe-reopen-btn:hover, #history-btn:hover { border-color: var(--primary); color: var(--primary); }
        #fe-folder-name { width: 100%; padding: 4px 7px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 4px; color: #94a3b8; font-size: 11px; font-family: monospace; outline: none; }
        #fe-folder-name::placeholder { color: #475569; font-style: italic; }
        #fe-folder-name:focus { border-color: var(--primary); color: var(--text-main); }
        #edge-label-tooltip { position: fixed; background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--text-main); max-width: 300px; pointer-events: none; z-index: 9999; box-shadow: 0 4px 16px rgba(0,0,0,0.4); display: none; }
        #edge-label-tooltip ul { margin: 0; padding: 0 0 0 14px; list-style: disc; }
        #edge-label-tooltip li { padding: 1px 0; line-height: 1.6; word-break: break-word; }
        #fe-search { margin: 0 10px 8px; padding: 5px 9px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 5px; color: var(--text-main); font-size: 12px; outline: none; width: calc(100% - 20px); }
        #fe-search:focus { border-color: var(--primary); }
        .fe-file.keyboard-focus { background: #1e3a5f; outline: 1px solid var(--primary); }
        #fe-tree { flex: 1; overflow-y: auto; padding: 0 6px 8px; min-height: 0; }
        #fe-empty { padding: 16px; text-align: center; font-size: 12px; color: #64748b; }
        .fe-dir { user-select: none; }
        .fe-dir-row { display: flex; align-items: center; gap: 5px; padding: 3px 4px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #94a3b8; }
        .fe-dir-row:hover { background: rgba(255,255,255,0.04); }
        .fe-dir-arrow { font-size: 9px; width: 10px; text-align: center; flex-shrink: 0; transition: transform 0.15s; }
        .fe-dir-arrow.open { transform: rotate(90deg); }
        .fe-dir-children { margin-left: 14px; border-left: 1px solid var(--border); padding-left: 4px; }
        .fe-dir-children.hidden { display: none; }
        .fe-file { display: flex; align-items: center; gap: 6px; padding: 3px 6px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #cbd5e1; transition: background 0.1s; user-select: none; }
        .fe-file:hover { background: rgba(16,185,129,0.08); color: var(--primary); }
        .fe-file.loaded { color: var(--primary); font-weight: 600; }
        .fe-file-icon { font-size: 10px; color: #64748b; flex-shrink: 0; }
        .fe-file.loaded .fe-file-icon { color: var(--primary); }

        /* METHOD PICKER PANEL */
        #method-picker { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
        #method-picker.visible { display: flex; }
        #method-picker-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        #method-picker-classname { font-weight: 700; font-size: 0.95rem; color: var(--primary); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #method-picker-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .method-pill { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; cursor: pointer; border: 1px solid var(--border); background: var(--bg-main); transition: 0.15s; user-select: none; }
        .method-pill:hover { border-color: var(--primary); }
        .method-pill.enabled { border-color: var(--primary); background: rgba(16,185,129,0.08); }
        .method-pill .pill-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); background: transparent; flex-shrink: 0; transition: 0.15s; }
        .method-pill.enabled .pill-dot { background: var(--primary); border-color: var(--primary); }
        .method-pill .pill-name { font-size: 13px; font-weight: 600; flex: 1; }
        .method-pill .pill-badge { font-size: 10px; color: #64748b; background: #1e293b; padding: 2px 6px; border-radius: 4px; }

        /* VIEWPORT & ASPECT RATIO */
        #viewport { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; overflow: hidden; transition: margin-left 0.4s ease; }
        .toolbar { height: 60px; background: var(--bg-sidebar); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; z-index: 25; }

        #diagram-wrapper { 
            flex: 1; 
            position: relative; 
            overflow: auto;
            background: var(--bg-main);
            display: flex;
            align-items: stretch;
            justify-content: stretch;
        }

        #mermaid-area { 
            width: auto;
            height: 100%;
            /* Allow SVG to expand and scroll horizontally */
            overflow: auto;
            min-width: 100%;
            display: inline-flex;
        }

        #mermaid-area .nodeLabel,
        #mermaid-area svg text {
            user-select: text;
            -webkit-user-select: text;
        }

        /* Entry method nodes are clickable in focused flow */
        #mermaid-area svg [id*="entry"] .node rect {
            cursor: pointer;
            transition: stroke 0.2s, fill 0.2s;
        }
        #mermaid-area svg [id*="entry"] .node:hover rect {
            stroke: var(--primary) !important;
            filter: drop-shadow(0 0 3px var(--primary));
        }

        /* HIGHLIGHT PULSE */
        .node-focused rect, .node-focused polygon, .node-focused path, .node-focused circle {
            stroke: var(--highlight) !important;
            stroke-width: 6px !important;
            filter: drop-shadow(0 0 10px var(--highlight));
        }

        #code-tooltip { 
            position: fixed; 
            display: none; 
            z-index: 1000; 
            background: #1d1d1d; 
            border: 1px solid var(--primary); 
            border-radius: 8px; 
            padding: 0;
            width: 720px;
            height: 480px;
            max-width: 90vw;
            max-height: 90vh;
            min-width: 300px;
            min-height: 150px;
            overflow: hidden;
            pointer-events: auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            user-select: none;
            -webkit-user-select: none;
            flex-direction: column;
        }
        #code-tooltip-body, #code-tooltip-body * {
            user-select: text;
            -webkit-user-select: text;
            cursor: text;
        }
        #tooltip-copy-btn { padding: 4px 10px; font-size: 11px; border-radius: 5px; border: 1px solid var(--border); background: transparent; color: var(--primary); cursor: pointer; transition: 0.15s; }
        #tooltip-copy-btn:hover { background: var(--primary); color: #fff; }
        #tooltip-close-btn { padding: 4px 8px; font-size: 13px; border-radius: 5px; border: none; background: transparent; color: #64748b; cursor: pointer; line-height: 1; }
        #tooltip-close-btn:hover { color: #fff; }
        #code-tooltip-header {
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
        }
        #code-tooltip-body {
            padding: 15px;
            overflow: auto;
            flex: 1;
            min-height: 0;
        }
        #code-tooltip::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 16px;
            height: 16px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--primary) 50%);
            pointer-events: auto;
        }
        #code-tooltip pre,
        #code-tooltip code { font-size: 0.9rem; }

        .btn { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-sidebar); color: var(--text-main); cursor: pointer; font-size: 11px; font-weight: 600; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        
        #node-context-menu {
            position: fixed; display: none; z-index: 2000;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            min-width: 170px;
        }
        #edge-context-menu {
            position: fixed; display: none; z-index: 2000;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 8px; overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            min-width: 180px; max-width: 280px;
        }
        #edge-ctx-header {
            padding: 8px 12px 7px; font-size: 11px; color: #64748b;
            border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
        }
        #edge-ctx-header .edge-ctx-cls { color: #10b981; font-weight: 600; }
        #edge-ctx-header i { color: #64748b; font-size: 9px; }
        #edge-ctx-body { padding: 6px 14px 10px; }
        #edge-ctx-body ul { margin: 0; padding: 0 0 0 14px; list-style: disc; }
        #edge-ctx-body li { padding: 2px 0; font-size: 12px; line-height: 1.6; color: #e2e8f0; }
        .ctx-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer; font-size: 13px;
            color: #e2e8f0; transition: background 0.12s;
        }
        .ctx-item:hover { background: #334155; }
        .ctx-item i { width: 14px; text-align: center; color: #10b981; }
        .ctx-separator { height: 1px; background: #334155; margin: 2px 0; }
        .btn-toggle { 
            position: absolute; top: 12px; left: 12px; z-index: 100; 
            background: var(--bg-sidebar); border: 1px solid var(--primary); 
            color: var(--primary); width: 36px; height: 36px; border-radius: 8px; 
            cursor: pointer; transition: 0.3s;
        }
        .btn-toggle:hover { background: var(--primary); color: white; }

        /* CLASS HISTORY PANEL */
        #class-history-panel {
            position: absolute; top: 68px; right: 12px; z-index: 500;
            width: 260px; background: var(--bg-sidebar); border: 1px solid var(--border);
            border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none; flex-direction: column; overflow: hidden;
        }
        #class-history-panel.open { display: flex; }
        #chp-header { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; font-size: 12px; font-weight: 700; color: #94a3b8; }
        #chp-header span { flex: 1; }
        #chp-close-btn { background: none; border: none; color: #64748b; cursor: pointer; font-size: 13px; padding: 0 3px; }
        #chp-close-btn:hover { color: var(--text-main); }
        #chp-list { max-height: 320px; overflow-y: auto; padding: 6px; }
        .chp-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; cursor: pointer; transition: background 0.1s; }
        .chp-item:hover { background: rgba(255,255,255,0.05); }
        .chp-item i { font-size: 11px; color: var(--primary); flex-shrink: 0; }
        .chp-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chp-meta { font-size: 10px; color: #64748b; flex-shrink: 0; }
        .chp-del { background: none; border: none; color: #475569; cursor: pointer; font-size: 11px; padding: 0 3px; flex-shrink: 0; }
        .chp-del:hover { color: var(--danger); }
        #chp-empty { padding: 20px; text-align: center; font-size: 12px; color: #64748b; }

        #drop-overlay {
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(16, 185, 129, 0.12);
            border: 3px dashed var(--primary);
            display: none; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600; color: var(--primary);
            pointer-events: none;
        }
        #drop-overlay.show { display: flex; }
    </style>
</head>
<body>
<div id="drop-overlay">Drop .cls / .java files anywhere</div>

<div id="code-tooltip">
    <div id="code-tooltip-header">
        <span id="tooltip-title">Code Snippet</span>
        <div style="display:flex;gap:6px;align-items:center;">
            <button id="tooltip-copy-btn" onclick="copyTooltipCode()"><i class="fa-regular fa-copy"></i> Copy</button>
            <button id="tooltip-close-btn" onclick="hideCodeTooltip()" title="Close">✕</button>
        </div>
    </div>
    <div id="code-tooltip-body">
        <pre><code class="language-java" id="tooltip-code"></code></pre>
    </div>
</div>

<div id="node-context-menu">
    <div class="ctx-item" id="ctx-toggle-nodes"><i class="fa-solid fa-eye-slash"></i><span id="ctx-toggle-label">Hide Nodes</span></div>
    <div class="ctx-item" id="ctx-hide-children" style="display:none"><i class="fa-solid fa-circle-nodes"></i><span id="ctx-hide-children-label">Hide Children</span></div>
    <div class="ctx-separator"></div>
    <div class="ctx-item" id="ctx-load-class" style="display:none"><i class="fa-solid fa-file-import"></i><span>Load Class</span></div>
    <div class="ctx-item" id="ctx-view-code"><i class="fa-solid fa-code"></i><span>View Code</span></div>
</div>

<div id="edge-context-menu">
    <div id="edge-ctx-header">
        <span class="edge-ctx-cls" id="edge-ctx-source"></span>
        <i class="fa-solid fa-arrow-right"></i>
        <span class="edge-ctx-cls" id="edge-ctx-target"></span>
    </div>
    <div id="edge-ctx-body"><ul id="edge-ctx-list"></ul></div>
</div>

<div id="class-history-panel">
    <div id="chp-header">
        <span>Class History</span>
        <button id="chp-close-btn">✕</button>
    </div>
    <div id="chp-list"></div>
</div>

<input id="ctx-file-picker" type="file" accept=".cls,.java" style="display:none">

<button class="btn-toggle" onclick="toggleSidebar()" title="Toggle Sidebar"><i class="fa-solid fa-bars"></i></button>

<div id="sidebar">
    <div class="sidebar-header"><h2 style="margin:0; margin-left: 45px; color:var(--primary); font-size:1.1rem;">Apex / Java Class Diagram</h2></div>
    <div id="file-explorer">
        <div id="file-explorer-header">
            <span>File Explorer</span>
            <button id="fe-open-btn"><i class="fa-solid fa-folder-open"></i> Open Folder</button>
            <input id="fe-fallback" type="file" accept=".cls,.java" webkitdirectory multiple>
        </div>
        <div id="fe-folder-path">
            <div id="fe-folder-path-label">
                <i class="fa-solid fa-folder"></i>
                <span>Folder path</span>
                <button id="fe-reopen-btn" title="Re-open this folder">↺ Reopen</button>
                <button id="history-btn" title="File history"><i class="fa-solid fa-clock-rotate-left"></i></button>
            </div>
            <input id="fe-folder-name" type="text" spellcheck="false" placeholder="Paste full path here, e.g. /home/user/project/src" autocomplete="off">
        </div>
        <input id="fe-search" placeholder="Search files…" autocomplete="off">
        <div id="fe-tree"><div id="fe-empty">Open a folder to browse source files</div></div>
    </div>
    <div id="class-panel" style="display:flex; flex-direction:column; flex:1; min-height:0;">
        <div id="registry-list"></div>
        <div style="padding:15px;"><button class="btn" style="width:100%" onclick="location.reload()">Clear All</button></div>
    </div>
    <div id="method-picker">
        <div id="method-picker-header">
            <button class="btn" onclick="exitAnalyzeFlow()" style="padding:6px 10px;"><i class="fa-solid fa-arrow-left"></i></button>
            <span id="method-picker-classname"></span>
        </div>
        <div id="method-picker-list"></div>
    </div>
</div>

<div id="viewport">
    <div class="toolbar">
        <h3 id="view-title" style="margin-left: 50px; font-size: 0.9rem; color: var(--text-dim);">Ready</h3>
        <div style="display: flex; gap: 10px;">
            <button class="btn" id="copy-mermaid-btn" onclick="copyCurrentMermaid()" title="Copy Mermaid code">
                <i class="fa-regular fa-copy"></i>
            </button>
            <button class="btn btn-primary" id="reset-btn" onclick="exitAnalyzeFlow()" style="display:none;">Back to Overview</button>
        </div>
    </div>
    <div id="diagram-wrapper">
        <div id="mermaid-area"></div>
    </div>
</div>

<script>
    // Configured for portrait-friendly graph generation
    mermaid.initialize({ 
        startOnLoad: false, 
        theme: 'dark', 
        securityLevel: 'loose', 
        flowchart: {
            useMaxWidth: false,
            defaultRenderer: 'elk',
            rankSpacing: 80,
            nodeSpacing: 25,
            curve: 'basis'
        } 
    });
    
    const registry = {};
    let focusedClass = null;
    let panZoomInstance = null;
    let selectedClassName = null;
    let tooltipGlobalHandlersBound = false;
    let currentMermaidDefinition = '';
    let hiddenClasses = new Set();
    let expandedMethods = new Map();
    let activeMethods = new Set();
    let collapsedMethods = new Set(); // Active methods whose subnodes are hidden
    let collapsedNodes = new Set();   // Node ids (any depth) whose children are collapsed
    let currentRenderedEdgeStyles = [];
    let tooltipDragState = { isDragging: false, startX: 0, startY: 0, startLeft: 0, startTop: 0 };
    let tooltipResizeState = { isResizing: false, startX: 0, startY: 0, startWidth: 0, startHeight: 0 };
    let tooltipInteractionGuardUntil = 0;

    const SYSTEM_TYPES = new Set([
        // Apex
        'list', 'set', 'map', 'string', 'integer', 'long', 'decimal', 'double', 'boolean',
        'id', 'blob', 'date', 'datetime', 'time', 'object', 'database', 'schema', 'sobject',
        'system', 'limits', 'userinfo', 'exception', 'selectoption', 'pagereference',
        'json', 'pattern', 'matcher', 'crypto', 'http', 'httprequest', 'httpresponse',
        // Java
        'float', 'byte', 'short', 'char', 'void', 'number', 'math', 'runtime', 'thread',
        'runnable', 'callable', 'runtimeexception', 'throwable', 'error', 'optional',
        'stream', 'collectors', 'collections', 'arrays', 'objects', 'stringbuilder',
        'stringbuffer', 'iterable', 'iterator', 'comparable', 'comparator', 'arraylist',
        'linkedlist', 'hashmap', 'linkedhashmap', 'treemap', 'hashset', 'linkedhashset',
        'treeset', 'queue', 'deque', 'stack', 'vector', 'properties', 'calendar',
        'localdate', 'localdatetime', 'instant', 'duration', 'scanner', 'printstream',
        'inputstream', 'outputstream', 'reader', 'writer', 'file', 'path', 'files',
        'paths', 'logger', 'log'
    ]);
    const BANNED_METHODS = new Set(['add', 'get', 'put', 'putall', 'addall', 'size', 'contains', 'containskey', 'isempty', 'remove', 'clear', 'values', 'keyset', 'entryset', 'clone', 'sort', 'indexof', 'substring', 'length', 'tolowercase', 'touppercase', 'trim', 'strip', 'split', 'replace', 'replaceall', 'format', 'valueof', 'tostring', 'equals', 'hashcode', 'compareto', 'iterator', 'stream', 'foreach', 'println', 'print', 'printf', 'append', 'toarray', 'asList', 'aslist', 'ofnullable', 'isPresent', 'ispresent', 'orElse', 'orelse', 'getordefault']);
    const PATH_COLORS = ['#10b981', '#6366f1', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4', '#f43f5e', '#14b8a6'];

    const dropOverlay = document.getElementById('drop-overlay');

    document.addEventListener('dragover', e => {
        e.preventDefault();
        if (!window._feDragNode) dropOverlay.classList.add('show');
    });
    document.addEventListener('dragleave', e => {
        if (!e.relatedTarget) dropOverlay.classList.remove('show');
    });
    document.addEventListener('drop', async e => {
        e.preventDefault();
        dropOverlay.classList.remove('show');

        // Drag from internal file explorer
        if (window._feDragNode) {
            await loadFileNode(window._feDragNode, null);
            feState.loadedNames.add(window._feDragNode.name);
            renderFileTree();
            window._feDragNode = null;
            return;
        }

        const files = Array.from(e.dataTransfer.files)
            .filter(f => f.name.toLowerCase().endsWith('.cls') || f.name.toLowerCase().endsWith('.java'));

        if (files.length === 0) return;

        for (const file of files) {
            const text = await file.text();
            parseApex(text);
        }

        render();
    });

    // ── FILE EXPLORER ──────────────────────────────────────────────────────────
    const feState = { tree: null, search: '', loadedNames: new Set(), dirHandle: null };

    // ── IndexedDB persistence for the directory handle ─────────────────────────
    const IDB_NAME = 'apexflow', IDB_DIR_STORE = 'handles', IDB_DIR_KEY = 'lastDir', IDB_HIST_STORE = 'fileHistory';
    const MAX_FILE_HIST = 30;

    function idbOpen() {
        return new Promise((res, rej) => {
            const req = indexedDB.open(IDB_NAME, 2); // version 2 adds fileHistory store
            req.onupgradeneeded = e => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(IDB_DIR_STORE)) db.createObjectStore(IDB_DIR_STORE);
                if (!db.objectStoreNames.contains(IDB_HIST_STORE)) db.createObjectStore(IDB_HIST_STORE, { keyPath: 'name' });
            };
            req.onsuccess = e => res(e.target.result);
            req.onerror = e => rej(e.target.error);
        });
    }

    async function idbSaveHandle(handle) {
        try {
            const db = await idbOpen();
            const tx = db.transaction(IDB_DIR_STORE, 'readwrite');
            tx.objectStore(IDB_DIR_STORE).put(handle, IDB_DIR_KEY);
        } catch (e) { console.warn('idb save failed', e); }
    }

    async function idbLoadHandle() {
        try {
            const db = await idbOpen();
            return await new Promise((res, rej) => {
                const req = db.transaction(IDB_DIR_STORE, 'readonly').objectStore(IDB_DIR_STORE).get(IDB_DIR_KEY);
                req.onsuccess = e => res(e.target.result || null);
                req.onerror = e => rej(e.target.error);
            });
        } catch (e) { return null; }
    }

    async function idbSaveFileHistory(name, handle) {
        try {
            const db = await idbOpen();
            const tx = db.transaction(IDB_HIST_STORE, 'readwrite');
            tx.objectStore(IDB_HIST_STORE).put({ name, handle, ts: Date.now() });
            // Trim to MAX_FILE_HIST — get all, sort, delete oldest
            const all = await new Promise((res, rej) => {
                const req2 = db.transaction(IDB_HIST_STORE, 'readonly').objectStore(IDB_HIST_STORE).getAll();
                req2.onsuccess = e => res(e.target.result);
                req2.onerror = e => rej(e.target.error);
            });
            if (all.length > MAX_FILE_HIST) {
                all.sort((a, b) => a.ts - b.ts);
                const del = db.transaction(IDB_HIST_STORE, 'readwrite').objectStore(IDB_HIST_STORE);
                all.slice(0, all.length - MAX_FILE_HIST).forEach(r => del.delete(r.name));
            }
        } catch (e) { console.warn('idb file history save failed', e); }
    }

    async function idbGetFileHistory() {
        try {
            const db = await idbOpen();
            return await new Promise((res, rej) => {
                const req = db.transaction(IDB_HIST_STORE, 'readonly').objectStore(IDB_HIST_STORE).getAll();
                req.onsuccess = e => res((e.target.result || []).sort((a, b) => b.ts - a.ts));
                req.onerror = e => rej(e.target.error);
            });
        } catch (e) { return []; }
    }

    async function idbDeleteFileHistory(name) {
        try {
            const db = await idbOpen();
            db.transaction(IDB_HIST_STORE, 'readwrite').objectStore(IDB_HIST_STORE).delete(name);
        } catch (e) { console.warn('idb file history delete failed', e); }
    }

    // ── Folder path display ────────────────────────────────────────────────────
    const LS_PATH_KEY = 'apexflow-folder-path';

    function showFolderPath(folderName, autoFocus = false) {
        const bar = document.getElementById('fe-folder-path');
        const nameEl = document.getElementById('fe-folder-name');

    document.getElementById('fe-folder-name').addEventListener('change', e => {

    });
    document.getElementById('fe-folder-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') e.target.blur();

    // ── Open / reopen folder ───────────────────────────────────────────────────
    function isSourceFile(name) {
        const n = name.toLowerCase();
        return n.endsWith('.cls') || n.endsWith('.java');
    }

    async function loadDirHandle(dirHandle, isReopen = false) {
        feState.dirHandle = dirHandle;
        feState.tree = await buildHandleTree(dirHandle, dirHandle.name);
        if (!isReopen) localStorage.removeItem(LS_PATH_KEY);
        showFolderPath(dirHandle.name, !isReopen);
        renderFileTree();
        await idbSaveHandle(dirHandle);
    }

    async function openFolder() {
        if (window.showDirectoryPicker) {
            try {
                const dirHandle = await window.showDirectoryPicker({ mode: 'read' });
                await loadDirHandle(dirHandle);
            } catch (e) {
                if (e.name !== 'AbortError') console.error(e);
            }
        } else {
            document.getElementById('fe-fallback').click();
        }
    }

    async function reopenFolder() {
        if (!feState.dirHandle) return;
        try {
            const perm = await feState.dirHandle.requestPermission({ mode: 'read' });
            if (perm === 'granted') await loadDirHandle(feState.dirHandle, true);
        } catch (e) { console.error(e); }
    }

    // On load: restore last handle if available
    idbLoadHandle().then(async handle => {
        if (!handle) return;
        feState.dirHandle = handle;
        showFolderPath(handle.name);
        document.getElementById('fe-empty').textContent = `Click ↺ Reopen to reload "${handle.name}"`;
    });

    async function buildHandleTree(handle, name) {
        if (handle.kind === 'file') {
            return isSourceFile(name) ? { kind: 'file', name, handle } : null;
        }
        const children = [];
        for await (const [childName, childHandle] of handle.entries()) {
            const node = await buildHandleTree(childHandle, childName);
            if (node) children.push(node);
        }
        if (!children.length) return null;
        children.sort((a, b) => {
            if (a.kind !== b.kind) return a.kind === 'dir' ? -1 : 1;
            return a.name.localeCompare(b.name);
        });
        return { kind: 'dir', name, children };
    }

    function flatFiles(node, out = []) {
        if (!node) return out;
        if (node.kind === 'file') { out.push(node); return out; }
        node.children.forEach(c => flatFiles(c, out));
        return out;
    }

    function renderFileTree() {
        const treeEl = document.getElementById('fe-tree');
        const emptyEl = document.getElementById('fe-empty');
        const q = feState.search.toLowerCase();

        if (!feState.tree) {
            treeEl.innerHTML = '';
            treeEl.appendChild(emptyEl || Object.assign(document.createElement('div'), { id: 'fe-empty', textContent: 'Open a folder to browse source files' }));
            return;
        }

        const allFiles = flatFiles(feState.tree);
        const matched = q ? allFiles.filter(f => f.name.toLowerCase().includes(q)) : null;

        treeEl.innerHTML = '';

        if (q) {
            // Flat search results
            if (!matched.length) {
                treeEl.innerHTML = `<div style="padding:12px;text-align:center;font-size:12px;color:#64748b">No files match "${feState.search}"</div>`;
                return;
            }
            matched.forEach(f => treeEl.appendChild(makeFileRow(f)));
        } else {
            treeEl.appendChild(makeDirNode(feState.tree, true));
        }
    }

    function makeDirNode(node, expanded = false) {
        if (node.kind === 'file') return makeFileRow(node);
        const wrap = document.createElement('div');
        wrap.className = 'fe-dir';
        const row = document.createElement('div');
        row.className = 'fe-dir-row';
        const arrow = document.createElement('span');
        arrow.className = 'fe-dir-arrow' + (expanded ? ' open' : '');
        arrow.textContent = '▶';
        const icon = document.createElement('i');
        icon.className = expanded ? 'fa-solid fa-folder-open' : 'fa-solid fa-folder';
        icon.style.cssText = 'font-size:11px;color:#f59e0b;flex-shrink:0';
        const label = document.createElement('span');
        label.textContent = node.name;
        row.appendChild(arrow); row.appendChild(icon); row.appendChild(label);
        const children = document.createElement('div');
        children.className = 'fe-dir-children' + (expanded ? '' : ' hidden');
        node.children.forEach(c => children.appendChild(makeDirNode(c)));
        row.addEventListener('click', () => {
            const open = !children.classList.contains('hidden');
            children.classList.toggle('hidden', open);
            arrow.classList.toggle('open', !open);
            icon.className = open ? 'fa-solid fa-folder' : 'fa-solid fa-folder-open';
            icon.style.cssText = 'font-size:11px;color:#f59e0b;flex-shrink:0';
        });
        wrap.appendChild(row); wrap.appendChild(children);
        return wrap;
    }

    function makeFileRow(fileNode) {
        const row = document.createElement('div');
        row.className = 'fe-file' + (feState.loadedNames.has(fileNode.name) ? ' loaded' : '');
        row.draggable = true;
        const icon = document.createElement('i');
        icon.className = 'fa-solid fa-file-code fe-file-icon';
        const label = document.createElement('span');
        label.textContent = fileNode.name;
        row.appendChild(icon); row.appendChild(label);
        row.addEventListener('click', () => loadFileNode(fileNode, row));
        row.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/fe-filename', fileNode.name);
            e.dataTransfer.effectAllowed = 'copy';
            // Store reference so the document drop handler can retrieve it
            window._feDragNode = fileNode;
        });
        row.addEventListener('dragend', () => { window._feDragNode = null; });
        return row;
    }

    async function loadFileNode(fileNode, rowEl) {
        try {
            const file = await fileNode.handle.getFile();
            const text = await file.text();
            parseApex(text);
            feState.loadedNames.add(fileNode.name);
            if (rowEl) { rowEl.classList.add('loaded'); rowEl.querySelector('.fe-file-icon').className = 'fa-solid fa-file-code fe-file-icon'; }
            render();
            await idbSaveFileHistory(fileNode.name, fileNode.handle);
        } catch (e) { console.error('Failed to load', fileNode.name, e); }
    }

    // Firefox fallback: webkitdirectory input
    document.getElementById('fe-fallback').addEventListener('change', async e => {
        const files = Array.from(e.target.files).filter(f => isSourceFile(f.name));
        if (!files.length) return;
        // Build a virtual tree from webkitRelativePath
        const root = { kind: 'dir', name: files[0].webkitRelativePath.split('/')[0], children: [] };
        const dirMap = { '': root };
        files.forEach(f => {
            const parts = f.webkitRelativePath.split('/');
            const fileName = parts.pop();
            const dirPath = parts.join('/');
            if (!dirMap[dirPath]) {
                let cur = root;
                parts.slice(1).forEach((seg, i) => {
                    const path = parts.slice(0, i + 2).join('/');
                    if (!dirMap[path]) {
                        const dir = { kind: 'dir', name: seg, children: [] };
                        cur.children.push(dir);
                        dirMap[path] = dir;
                    }
                    cur = dirMap[path];
                });
            }
            dirMap[dirPath].children.push({ kind: 'file', name: fileName, handle: { getFile: async () => f } });
        });
        feState.tree = root;
        renderFileTree();
    });

    document.getElementById('fe-open-btn').addEventListener('click', openFolder);
    document.getElementById('fe-reopen-btn').addEventListener('click', reopenFolder);

    function feMoveCursor(delta) {
        const rows = feGetSearchRows();
        if (!rows.length) return;
        rows.forEach(r => r.classList.remove('keyboard-focus'));
        feSearchCursor = Math.max(0, Math.min(rows.length - 1, feSearchCursor + delta));
        const target = rows[feSearchCursor];
        target.classList.add('keyboard-focus');
        target.scrollIntoView({ block: 'nearest' });
    }

    document.getElementById('fe-search').addEventListener('input', e => {

        else if (e.key === 'Enter') {
            e.preventDefault();

            rows[idx]?.click();

    });

    // ── File history ───────────────────────────────────────────────────────────
    function timeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60) return 'just now';
        if (s < 3600) return `${Math.floor(s/60)}m ago`;
        if (s < 86400) return `${Math.floor(s/3600)}h ago`;
        return `${Math.floor(s/86400)}d ago`;
    }

    // ── Load class from ghost node ─────────────────────────────────────────────
    function getLoadedChildren(className) {

    function parseApex(content) {
        const classNameMatch = content.match(/(?:class|interface|enum|record)\s+(\w+)/i);
        if (!classNameMatch) return;
        const className = classNameMatch[1];
        const varMap = {}; 
        const varRegex = /(?:public|private|protected|global|(?:\s|^|[,(]))\s*([\w<>.]+)\s+(\w+)\s*[;=,)]/g;
        let vMatch;
        while ((vMatch = varRegex.exec(content)) !== null) { 
            if(!['return','if','for'].includes(vMatch[1])) varMap[vMatch[2]] = vMatch[1];
        }
        // DI pattern: new SomeWrapper(ActualClass.class) — map variable to the inner .class arg
        // e.g. new pselib_Dependency(SMAC_ImpactAnalysisServiceImpl.class)
        const diRegex = /(?:[\w<>]+)\s+(\w+)\s*=\s*new\s+\w[\w.<>]*\s*\(\s*(\w+)\.class\s*\)/g;
        let diMatch;
        while ((diMatch = diRegex.exec(content)) !== null) {
            varMap[diMatch[1]] = diMatch[2]; // override with the real impl class
        }
        const methods = {};
        const methodRegex = /\b(?:public|private|protected|global)\s+(?:(?:static|final|abstract|virtual|override|synchronized|native|default|strictfp|webservice|testmethod)\s+)*(?:[\w.\[\],<>\s]+?)\s+(\w+)\s*\(/g;
        let mMatch;
        while ((mMatch = methodRegex.exec(content)) !== null) {
            const mName = mMatch[1];
            if (['if','for','while','switch'].includes(mName)) continue;
            const start = mMatch.index;
            const nextMatch = content.slice(start + 1).search(/(?:public|private|protected|global)\s/);
            methods[mName] = nextMatch > -1 ? content.slice(start, start + nextMatch) : content.slice(start);
        }
        registry[className] = { varMap, methods, raw: content };
    }

    function cleanLabel(text) {
        if (!text) return "";
        return text.replace(/"/g, "'").replace(/[\[\]\(\)]/g, "").trim();
    }

    function attachEdgeLabelTooltips(svgEl, fullLabels) {
        if (!fullLabels.length) return;
        const tooltip = document.getElementById('edge-label-tooltip');
        const truncatedEls = Array.from(svgEl.querySelectorAll('.edgeLabel'))
            .filter(el => el.textContent.includes('…'));
        truncatedEls.forEach((el, i) => {
            if (!fullLabels[i]) return;

            el.style.cursor = 'help';
