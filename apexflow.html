                tooltip.innerHTML = '<ul>' + full.split(', ').map(r => `<li>${r}</li>`).join('') + '</ul>';
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
            });
            el.addEventListener('mousemove', e => {
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top = (e.clientY - 10) + 'px';
            });
            el.addEventListener('mouseleave', () => {
                tooltip.style.display = 'none';
            });
        });
    }

    function normalizeEdgeKeyPart(value) {
        return String(value || '').replace(/[^\w]/g, '_');
    }

    function applyRenderedEdgeStyles(svgEl) {
        if (!svgEl || !currentRenderedEdgeStyles.length) return;

        const edgeUsageCount = new Map();
        const allRenderedEdges = Array.from(svgEl.querySelectorAll('.edgePath'));
        const fallbackVisibleEdges = allRenderedEdges.slice(-currentRenderedEdgeStyles.length);

        currentRenderedEdgeStyles.forEach((edge, styleIndex) => {
            const fromKey = normalizeEdgeKeyPart(edge.from);
            const toKey = normalizeEdgeKeyPart(edge.to);
            const selector = `.edgePath.LS-${fromKey}.LE-${toKey}`;
            const matchingEdges = Array.from(svgEl.querySelectorAll(selector));

            const edgeKey = `${fromKey}->${toKey}`;
            const matchIndex = edgeUsageCount.get(edgeKey) || 0;
            let edgeEl = matchingEdges[Math.min(matchIndex, Math.max(0, matchingEdges.length - 1))];
            if (!edgeEl) {
                edgeEl = fallbackVisibleEdges[styleIndex] || null;
            }
            edgeUsageCount.set(edgeKey, matchIndex + 1);
            if (!edgeEl) return;

            const pathEl = edgeEl.querySelector('path.path') || edgeEl.querySelector('path');
            if (pathEl) {
                pathEl.style.stroke = edge.color;
                pathEl.style.strokeWidth = edge.width;
                pathEl.style.fill = 'none';
                pathEl.style.strokeDasharray = edge.dasharray || 'none';
            }

            const markerPaths = Array.from(svgEl.querySelectorAll('marker path'));
            markerPaths.forEach(markerEl => {
                const markerId = markerEl.closest('marker')?.id || '';
                if (edgeEl.innerHTML.includes(markerId)) {
                    markerEl.style.stroke = edge.color;
                    markerEl.style.fill = edge.color;
                }
            });
        });
    }

    function safeId(n) { return n ? n.replace(/[^\w]/g, '_') : "unknown"; }

    async function render() {
        const list = document.getElementById('registry-list');
        list.innerHTML = "";
        Object.keys(registry).sort().forEach(name => {
            const isHidden = hiddenClasses.has(name);
            const card = document.createElement('div');
            card.className = 'class-card' + (selectedClassName === name ? ' active' : '') + (isHidden ? ' hidden' : '');
            card.id = `card-${safeId(name)}`;
            card.onclick = () => focusAndHighlight(name);
            card.innerHTML = `<div style="font-weight:600; font-size:13px;">${name}</div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button class="btn btn-primary" onclick="event.stopPropagation(); setView('${name}')" style="flex:1">Analyze Flow</button>
                    <button class="btn" title="${isHidden ? 'Show in diagram' : 'Hide from diagram'}" onclick="event.stopPropagation(); toggleClassVisibility('${name}')">
                        <i class="fa-solid ${isHidden ? 'fa-eye' : 'fa-eye-slash'}"></i>
                    </button>
                    <button class="btn" style="border-color:var(--danger); color:var(--danger);" onclick="event.stopPropagation(); delete registry['${name}']; render();">✖</button>
                </div>`;
            list.appendChild(card);
        });

        const wrapper = document.getElementById('mermaid-area');
        let def = "";
        let ghostNodes = new Set();
        let linkCounter = 0;
        let styleDirectives = [];
        currentRenderedEdgeStyles = [];
        let edgeLabelFull = [];

        if (!focusedClass) {
            document.getElementById('view-title').innerText = "System Architecture Map";
            document.getElementById('reset-btn').style.display = "none";
            // LR (Left-Right) for rightward cascading flow
            def = "graph LR\n";
            Object.keys(registry).filter(cName => !hiddenClasses.has(cName)).forEach(cName => {
                const flows = aggregateFlows(registry[cName].raw, registry[cName].varMap, cName);
                Object.keys(flows).forEach(target => {
                    if (hiddenClasses.has(target)) return;
                    const items = flows[target];
                    const isTruncated = items.length > 2;
                    const label = cleanLabel(isTruncated ? items[0] + ', ' + items[1] + '…' : items.join(', '));
                    if (isTruncated) edgeLabelFull.push(items.join(', '));
                    def += `  ${safeId(cName)} -- "${label}" --> ${safeId(target)}\n`;
                    if (!registry[target]) ghostNodes.add(target);
                });
                def += `  ${safeId(cName)}["${cName}"]\n`;
            });
        } else {
            document.getElementById('view-title').innerText = `Flow Analysis: ${focusedClass}`;
            document.getElementById('reset-btn').style.display = "inline-block";
            def = `graph LR\n`;

            const depthNodeMap = {};  // { depth: { nodeId: entry } }
            const allFlowEdges = [];
            const blockColors = new Map();
            let nextBlockColorIndex = 0;
            let globalSeq = 0;
            const MAX_FLOW_DEPTH = 6;

            function getBlockColor(blockKey) {
                if (!blockColors.has(blockKey)) {
                    blockColors.set(blockKey, PATH_COLORS[nextBlockColorIndex % PATH_COLORS.length]);
                    nextBlockColorIndex++;
                }
                return blockColors.get(blockKey);
            }

            function buildNode(level, className, methodName) {
                const classId = safeId(className);
                if (methodName) return { id: `l${level}__${classId}___${safeId(methodName)}`, label: `${methodName}()`, className, methodName };
                return { id: `l${level}__${classId}__class`, label: registry[className] ? className : `? ${className}`, className, methodName: null };
            }

            function collectFlowDepth(parentNodeId, calls, depth, edgeColor) {
                if (depth > MAX_FLOW_DEPTH) return;
                if (!depthNodeMap[depth]) depthNodeMap[depth] = {};
                calls.forEach(call => {
                    const targetClass = call.target;
                    if (hiddenClasses.has(targetClass)) return;
                    const node = buildNode(depth, targetClass, call.method);
                    const nodeColor = getBlockColor(`depth${depth}:${targetClass}:${call.method}`);
                    if (!depthNodeMap[depth][node.id]) {
                        const isCollapsed = collapsedNodes.has(node.id);
                        const subCalls = registry[targetClass]?.methods?.[call.method]
                            ? collectOrderedCalls(registry[targetClass].methods[call.method], registry[targetClass].varMap, targetClass)
                            : [];
                        const hasChildren = subCalls.length > 0;
                        depthNodeMap[depth][node.id] = {
                            node: { ...node, displayLabel: `${cleanLabel(node.label)}${hasChildren ? (isCollapsed ? ' ⊕' : ' ⊖') : ''}` },
                            color: nodeColor, seq: globalSeq++
                        };
                        if (!isCollapsed && subCalls.length > 0) {
                            collectFlowDepth(node.id, subCalls, depth + 1, nodeColor);
                        }
                    }
                    allFlowEdges.push({ from: parentNodeId, to: node.id, label: call.sequenceLabel, color: edgeColor, depth });
                });
            }

            const activeMethodList = [...activeMethods];

            if (activeMethodList.length === 0) {
                def += `  empty["Select a method from the sidebar to view its call flow"]\n`;
                def += `  style empty fill:#1e293b,stroke:#334155,color:#64748b\n`;
            } else {
                activeMethodList.forEach(entryMethod => {
                    const entryNodeId = `${safeId(focusedClass)}___${safeId(entryMethod)}`;
                    const isCollapsed = collapsedMethods.has(entryMethod);
                    const icon = isCollapsed ? '⊕' : '⊖';
                    def += `  ${entryNodeId}["${icon} ${entryMethod}()"]\n`;
                    def += `  style ${entryNodeId} fill:#1e293b,stroke:#10b981,stroke-width:2px,color:#f1f5f9\n`;
                    if (!isCollapsed) {
                        const entryBlockColor = getBlockColor(`entry:${entryMethod}`);
                        const calls = collectOrderedCalls(registry[focusedClass].methods[entryMethod], registry[focusedClass].varMap, focusedClass);
                        collectFlowDepth(entryNodeId, calls, 1, entryBlockColor);
                    }
                });

                function renderClassSubgraphs(depthClasses, sgPrefix) {
                    const byClass = {};
                    Object.values(depthClasses).sort((a, b) => a.seq - b.seq).forEach(e => {
                        const cls = e.node.className;
                        if (!byClass[cls]) byClass[cls] = [];
                        byClass[cls].push(e);
                    });
                    Object.entries(byClass).forEach(([cls, clsEntries]) => {
                        const sgId = `${sgPrefix}_${safeId(cls)}`;
                        const sgLabel = registry[cls] ? cls : `? ${cls}`;
                        def += `  subgraph ${sgId} ["${sgLabel}"]\n    direction TB\n`;
                        clsEntries.forEach(e => {
                            def += `    ${e.node.id}["${e.node.displayLabel || cleanLabel(e.node.label)}"]\n`;
                        });
                        def += `  end\n`;
                    });
                }

                Object.keys(depthNodeMap).sort((a, b) => +a - +b).forEach(depth => {
                    renderClassSubgraphs(depthNodeMap[depth], `sg${depth}`);
                });

                allFlowEdges.forEach(edge => {
                    def += `  ${edge.from} -- "${edge.label}" --> ${edge.to}\n`;
                    const sw = edge.depth === 1 ? '3px' : '2px';
                    const dash = edge.depth > 1 ? ',stroke-dasharray:6 3' : '';
                    styleDirectives.push(`linkStyle ${linkCounter} stroke:${edge.color},stroke-width:${sw},fill:none${dash}`);
                    linkCounter++;
                });
            }
        }

        ghostNodes.forEach(ghost => {
            def += `  ${safeId(ghost)}[["? ${ghost}"]]\n`;
            def += `  style ${safeId(ghost)} stroke-dasharray: 5 5, fill: #1e293b, stroke: #10b981\n`;
        });

        if (styleDirectives.length) {
            def += `\n${styleDirectives.join('\n')}\n`;
        }

        currentMermaidDefinition = def;

        let savedPanZoom = null;
        if (panZoomInstance) {
            savedPanZoom = { pan: panZoomInstance.getPan(), zoom: panZoomInstance.getZoom() };
            panZoomInstance.destroy(); panZoomInstance = null;
        }
        try {
            const { svg } = await mermaid.render('graphDiv', def);
            wrapper.innerHTML = svg;
            const svgEl = wrapper.querySelector('svg');
            if (svgEl) {
                svgEl.removeAttribute('height'); svgEl.removeAttribute('width');
                svgEl.style.width = "100%"; svgEl.style.height = "100%";
                applyRenderedEdgeStyles(svgEl);
                attachEdgeLabelTooltips(svgEl, edgeLabelFull);
                panZoomInstance = svgPanZoom(svgEl, {
                    zoomEnabled: true,
                    dblClickZoomEnabled: false,
                    fit: false,
                    center: false
                });
                requestAnimationFrame(() => {
                    if (!panZoomInstance) return;
                    panZoomInstance.resize();
                    if (savedPanZoom) {
                        panZoomInstance.zoom(savedPanZoom.zoom);
                        panZoomInstance.pan(savedPanZoom.pan);
                    } else {
                        panZoomInstance.fit();
                        panZoomInstance.center();
                    }
                });
                attachEvents();
                attachEdgeEvents(svgEl);
                attachClusterEvents(svgEl);
                if (selectedClassName) applyDiagramHighlight(selectedClassName);
            }
        } catch (err) { console.error(err); }
    }

    function selectNodeText(node) {
        const label = node.querySelector('.nodeLabel') || node.querySelector('text');
        if (!label) return;
        const textNode = label.firstChild;
        if (!textNode) return;
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(textNode);
        selection.removeAllRanges();
        selection.addRange(range);
    }

    function focusAndHighlight(name) {
        hideCodeTooltip();
        selectedClassName = name;
        document.querySelectorAll('.class-card').forEach(c => c.classList.remove('active'));
        const card = document.getElementById(`card-${safeId(name)}`);
        if (card) card.classList.add('active');
        applyDiagramHighlight(name);
        if (!panZoomInstance || focusedClass) return;

        const node = getDiagramNodeByClassName(name);
        if (node) {
            const bbox = node.getBBox();
            const area = document.getElementById('mermaid-area');
            const viewportWidth = Math.max(1, area.clientWidth);
            const viewportHeight = Math.max(1, area.clientHeight);

            // Dynamic zoom tuned to avoid over-zooming.
            const targetNodeWidth = Math.max(140, viewportWidth * 0.24);
            const targetNodeHeight = Math.max(70, viewportHeight * 0.12);
            const widthZoom = targetNodeWidth / Math.max(1, bbox.width);
            const heightZoom = targetNodeHeight / Math.max(1, bbox.height);
            const zoom = Math.max(0.9, Math.min(1.6, Math.min(widthZoom, heightZoom)));

            panZoomInstance.zoom(zoom);
            panZoomInstance.pan({
                x: (viewportWidth / 2) - ((bbox.x + bbox.width / 2) * zoom),
                y: (viewportHeight / 2) - ((bbox.y + bbox.height / 2) * zoom)
            });

            // Second pass: correct any residual offset in screen space.
            requestAnimationFrame(() => {
                const nodeRect = node.getBoundingClientRect();
                const areaRect = area.getBoundingClientRect();
                const deltaX = (areaRect.left + areaRect.width / 2) - (nodeRect.left + nodeRect.width / 2);
                const deltaY = (areaRect.top + areaRect.height / 2) - (nodeRect.top + nodeRect.height / 2);
                const currentPan = panZoomInstance.getPan();
                panZoomInstance.pan({
                    x: currentPan.x + deltaX,
                    y: currentPan.y + deltaY
                });
            });
        }
    }

    function toggleClassVisibility(name) {
        if (hiddenClasses.has(name)) {
            hiddenClasses.delete(name);
        } else {
            hiddenClasses.add(name);
            if (focusedClass === name) focusedClass = null;
            if (selectedClassName === name) selectedClassName = null;
        }
        render();
    }

    function applyDiagramHighlight(name) {
        document.querySelectorAll('.node').forEach(n => n.classList.remove('node-focused'));
        const node = getDiagramNodeByClassName(name);
        if (node) node.classList.add('node-focused');
    }

    function getDiagramNodeByClassName(name) {
        const wanted = (name || '').trim();
        if (!wanted) return null;

        const nodes = Array.from(document.querySelectorAll('.node'));

        // Prefer exact label text match to avoid partial id collisions.
        const byLabel = nodes.find(node => {
            const label = node.querySelector('.nodeLabel') || node.querySelector('text');
            return label && (label.textContent || '').trim() === wanted;
        });
        if (byLabel) return byLabel;

        // Fallback to id pattern used by Mermaid.
        return document.querySelector(`[id^="flowchart-${safeId(wanted)}-"]`);
    }

    function getClassNameFromNode(node) {
        if (!node) return null;

        const label = node.querySelector('.nodeLabel') || node.querySelector('text');
        const labelText = label ? (label.textContent || '').trim() : '';
        if (labelText && registry[labelText]) return labelText;

        const idText = (node.id || '').toLowerCase();
        const match = Object.keys(registry).find(name => idText.includes(safeId(name).toLowerCase()));
        return match || null;
    }

    function hideCodeTooltip() {
        document.getElementById('code-tooltip').style.display = 'none';
    }

    async function copyTooltipCode() {
        const code = document.getElementById('tooltip-code').textContent;
        const btn = document.getElementById('tooltip-copy-btn');
        try {
            if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(code);
            else { const t = document.createElement('textarea'); t.value = code; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied';
            setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy'; }, 1500);
        } catch { btn.innerHTML = '✕ Failed'; setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy"></i> Copy'; }, 1500); }
    }

    function bindTooltipGlobalHandlers() {
        if (tooltipGlobalHandlersBound) return;

        const tooltip = document.getElementById('code-tooltip');
        const header = document.getElementById('code-tooltip-header');

        header.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;
            tooltipDragState.isDragging = true;
            tooltipDragState.startX = e.clientX;
            tooltipDragState.startY = e.clientY;
            tooltipDragState.startLeft = tooltip.offsetLeft;
            tooltipDragState.startTop = tooltip.offsetTop;
            e.preventDefault();
            e.stopPropagation();
        });

        document.addEventListener('mousemove', (e) => {
            if (tooltipDragState.isDragging) {
                const deltaX = e.clientX - tooltipDragState.startX;
                const deltaY = e.clientY - tooltipDragState.startY;
                const nextLeft = tooltipDragState.startLeft + deltaX;
                const nextTop = tooltipDragState.startTop + deltaY;
                const maxLeft = window.innerWidth - tooltip.offsetWidth;
                const maxTop = window.innerHeight - tooltip.offsetHeight;
                tooltip.style.left = Math.max(0, Math.min(maxLeft, nextLeft)) + 'px';
                tooltip.style.top = Math.max(0, Math.min(maxTop, nextTop)) + 'px';
            }
            if (tooltipResizeState.isResizing) {
                const deltaX = e.clientX - tooltipResizeState.startX;
                const deltaY = e.clientY - tooltipResizeState.startY;
                const maxWidth = window.innerWidth - tooltip.offsetLeft;
                const maxHeight = window.innerHeight - tooltip.offsetTop;
                tooltip.style.width = Math.max(300, Math.min(maxWidth, tooltipResizeState.startWidth + deltaX)) + 'px';
                tooltip.style.height = Math.max(150, Math.min(maxHeight, tooltipResizeState.startHeight + deltaY)) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (tooltipDragState.isDragging || tooltipResizeState.isResizing) {
                tooltipInteractionGuardUntil = Date.now() + 250;
            }
            tooltipDragState.isDragging = false;
            tooltipResizeState.isResizing = false;
        });

        tooltip.addEventListener('mousedown', (e) => {
            const rect = tooltip.getBoundingClientRect();
            const isResizeHandle = e.clientX >= rect.right - 20 && e.clientY >= rect.bottom - 20;
            if (isResizeHandle && e.button === 0) {
                tooltipResizeState.isResizing = true;
                tooltipResizeState.startX = e.clientX;
                tooltipResizeState.startY = e.clientY;
                tooltipResizeState.startWidth = tooltip.offsetWidth;
                tooltipResizeState.startHeight = tooltip.offsetHeight;
                e.preventDefault();
                e.stopPropagation();
            }
        });

        document.addEventListener('click', (e) => {
            if (Date.now() < tooltipInteractionGuardUntil) return;
            if (window.getComputedStyle(tooltip).display === 'none') return;
            if (tooltip.contains(e.target)) return;
            hideCodeTooltip();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { hideCodeTooltip(); hideNodeContextMenu(); hideEdgeContextMenu(); }
        });
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('node-context-menu');
            if (!menu.contains(e.target)) hideNodeContextMenu();
            const emenu = document.getElementById('edge-context-menu');
            if (!emenu.contains(e.target)) hideEdgeContextMenu();
        }, true);
        document.addEventListener('scroll', () => { hideNodeContextMenu(); hideEdgeContextMenu(); }, true);

        tooltipGlobalHandlersBound = true;
    }

    function aggregateFlows(content, vMap, sourceName) {
        const aggregated = {};
        const direct = /([\w.]+)\.(\w+)\s*\(/g;

        function stripGeneric(typeName) {
            return (typeName || '').replace(/<[^>]*>/g, '').trim();
        }

        function pickClassTarget(typeName) {
            const cleaned = stripGeneric(typeName).replace(/[\[\]()]/g, '');
            if (!cleaned) return null;

            // Exact type match first, then outer type for Apex inner class names.
            if (registry[cleaned]) return cleaned;
            if (cleaned.includes('.')) {
                const outer = cleaned.split('.')[0];
                if (registry[outer]) return outer;
            }

            const base = cleaned.split('.')[0];
            if (!base || !/^[A-Za-z_]\w*$/.test(base)) return null;
            return base;
        }

        // Convert caller expressions into a dependency class target.
        function normalizeTarget(caller) {
            const rawCaller = (caller || '').trim();
            if (!rawCaller) return null;

            // this.someMember.method() should map to current class, not unknown members.
            if (rawCaller.toLowerCase().startsWith('this.')) return sourceName;

            const rootVar = rawCaller.split('.')[0];

            // Prefer declared variable type when available (e.g., reqContext -> SMAC_ProjectTaskServiceContext.RequestContext).
            if (vMap[rootVar]) {
                return pickClassTarget(vMap[rootVar]);
            }

            // Fallback for direct static-style calls.
            return pickClassTarget(rawCaller);
        }

        let m;
        while ((m = direct.exec(content)) !== null) {
            const caller = m[1];
            const method = m[2];
            const resTarget = normalizeTarget(caller);
            if (!resTarget) continue;

            const base = resTarget.toLowerCase();
            if (resTarget !== sourceName && !SYSTEM_TYPES.has(base) && !BANNED_METHODS.has(method.toLowerCase()) && base !== 'this') {
                if (!aggregated[resTarget]) aggregated[resTarget] = [];
                if (!aggregated[resTarget].includes(method)) aggregated[resTarget].push(method);
            }
        }

        // Scan for inner class type references: KnownClass.UpperCaseInnerType
        // Catches usage like List<SMAC_Foo.Response>, return types, param types, new List<SMAC_Foo.Response>()
        const innerTypeRegex = /\b([\w]+)\.([\w]+)\b/g;
        let it;
        while ((it = innerTypeRegex.exec(content)) !== null) {
            const outer = it[1];
            const inner = it[2];
            if (!registry[outer] || outer === sourceName) continue;
            if (!/^[A-Z]/.test(inner)) continue; // lowercase = method call, already handled above
            if (content[it.index + it[0].length] === '(') continue; // constructor/method call, already handled
            const base = outer.toLowerCase();
            if (SYSTEM_TYPES.has(base)) continue;
            if (!aggregated[outer]) aggregated[outer] = [];
            if (!aggregated[outer].includes(inner)) aggregated[outer].unshift(inner); // inner types shown first
        }

        // Detect constructor instantiations and chained builder calls:
        // new SomeClass(...).method1().method2()...;
        const constructorFlowRegex = /\bnew\s+([\w]+)\s*\([^)]*\)([\s\S]*?);/g;
        let cf;
        while ((cf = constructorFlowRegex.exec(content)) !== null) {
            const className = cf[1];
            if (!className || !/^[A-Z]/.test(className)) continue;
            const base = className.toLowerCase();
            if (SYSTEM_TYPES.has(base) || className === sourceName) continue;
            if (!aggregated[className]) aggregated[className] = [];
            // Collect chained method names on the constructor result
            const chainBody = cf[2] || '';
            const chainMethodRegex = /\.\s*(\w+)\s*\(/g;
            let chainMatch;
            let addedAny = false;
            while ((chainMatch = chainMethodRegex.exec(chainBody)) !== null) {
                const method = chainMatch[1];
                if (BANNED_METHODS.has(method.toLowerCase())) continue;
                if (!aggregated[className].includes(method)) {
                    aggregated[className].push(method);
                    addedAny = true;
                }
            }
            if (!addedAny && !aggregated[className].includes('new')) {
                aggregated[className].push('new');
            }
        }

        return aggregated;
    }

    function collectOrderedCalls(rawContent, vMap, sourceName) {
        // Parse only from the opening brace of the method body — skip the signature
        // so the method name itself doesn't match as a bare call
        const braceIdx = rawContent.indexOf('{');
        const content = braceIdx >= 0 ? rawContent.slice(braceIdx) : rawContent;

        // Build a local vMap copy extended with for-each loop variables
        // e.g. "for (SMAC_ImpactAnalysisRequestContext context : contexts)" -> context -> SMAC_ImpactAnalysisRequestContext
        const localVMap = Object.assign({}, vMap);
        const forEachRegex = /\bfor\s*\(\s*([\w.<>\[\]]+)\s+(\w+)\s*:/g;
        let fe;
        while ((fe = forEachRegex.exec(content)) !== null) {
            localVMap[fe[2]] = fe[1].replace(/<[^>]*>/g, '').replace(/[\[\]]/g, '').trim();
        }

        const calls = [];
        const directCallRegex = /([\w.]+)\.(\w+)\s*\(/g;
        const bareCallRegex = /\b([a-zA-Z_]\w*)\s*\(/g;

        function stripGeneric(typeName) {
            return (typeName || '').replace(/<[^>]*>/g, '').trim();
        }

        function pickClassTarget(typeName) {
            const cleaned = stripGeneric(typeName).replace(/[\[\]()]/g, '');
            if (!cleaned) return null;
            if (registry[cleaned]) return cleaned;
            if (cleaned.includes('.')) {
                const outer = cleaned.split('.')[0];
                if (registry[outer]) return outer;
            }
            const base = cleaned.split('.')[0];
            if (!base || !/^[A-Za-z_]\w*$/.test(base)) return null;
            return base;
        }

        function normalizeTarget(caller) {
            const rawCaller = (caller || '').trim();
            if (!rawCaller) return null;
            if (rawCaller.toLowerCase().startsWith('this.')) return sourceName;
            const rootVar = rawCaller.split('.')[0];
            if (localVMap[rootVar]) return pickClassTarget(localVMap[rootVar]);
            return pickClassTarget(rawCaller);
        }

        function findMatchingBrace(text, openPos) {
            let depth = 0;
            for (let i = openPos; i < text.length; i++) {
                const ch = text[i];
                if (ch === '{') depth++;
                if (ch === '}') {
                    depth--;
                    if (depth === 0) return i;
                }
            }
            return -1;
        }

        function detectLoopRanges(text) {
            const ranges = [];
            const loopStartRegex = /\b(for|while)\b[^{};]*\{|\bdo\s*\{/g;
            let m;
            while ((m = loopStartRegex.exec(text)) !== null) {
                const openIdx = text.indexOf('{', m.index);
                if (openIdx < 0) continue;
                const closeIdx = findMatchingBrace(text, openIdx);
                if (closeIdx < 0) continue;
                ranges.push({ start: openIdx, end: closeIdx });
            }
            return ranges;
        }

        function getLoopTag(index, loopRanges) {
            const containing = loopRanges.filter(r => index >= r.start && index <= r.end);
            if (!containing.length) return '';
            containing.sort((a, b) => (a.end - a.start) - (b.end - b.start));
            const chosen = containing[0];
            const loopIndex = loopRanges.indexOf(chosen);
            const alphabet = 'NMPQRSTUVWXYZABCDEFGHIJKL';
            return alphabet[loopIndex % alphabet.length];
        }

        const loopRanges = detectLoopRanges(content);
        let seq = 1;
        const seenCalls = new Set();

        function addCall(target, methodName, index, options = {}) {
            if (!target || !methodName) return;

            const allowSelf = options.allowSelf === true;
            const base = target.toLowerCase();
            if ((!allowSelf && target === sourceName) || SYSTEM_TYPES.has(base) || BANNED_METHODS.has(methodName.toLowerCase()) || base === 'this') {
                return;
            }

            const loopTag = getLoopTag(index, loopRanges);
            const callKey = `${target}.${methodName}`;
            if (seenCalls.has(callKey)) return;

            seenCalls.add(callKey);
            calls.push({
                target,
                method: methodName,
                sequenceLabel: `${seq}${loopTag}`
            });
            seq++;
        }

        // Capture object.method() calls
        let m;
        while ((m = directCallRegex.exec(content)) !== null) {
            const caller = m[1];
            const method = m[2];
            const target = normalizeTarget(caller);
            addCall(target, method, m.index);
        }

        // Capture bare method() calls (same class or via vMap)
        let bm;
        while ((bm = bareCallRegex.exec(content)) !== null) {
            const methodName = bm[1];
            const loopTag = getLoopTag(bm.index, loopRanges);

            if (['if', 'for', 'while', 'switch', 'return', 'new', 'class'].includes(methodName.toLowerCase())) {
                continue;
            }
            if (BANNED_METHODS.has(methodName.toLowerCase())) {
                continue;
            }

            // Check if it's an internal method in the same class
            if (registry[sourceName] && registry[sourceName].methods && registry[sourceName].methods[methodName]) {
                addCall(sourceName, methodName, bm.index, { allowSelf: true });
            }
        }

        // Capture inner class type references: KnownClass.UpperCaseInnerType used as types
        const innerTypeRegex2 = /\b([\w]+)\.([\w]+)\b/g;
        let it2;
        while ((it2 = innerTypeRegex2.exec(content)) !== null) {
            const outer = it2[1];
            const inner = it2[2];
            if (!registry[outer] || outer === sourceName) continue;
            if (!/^[A-Z]/.test(inner)) continue;
            if (content[it2.index + it2[0].length] === '(') continue;
            const base = outer.toLowerCase();
            if (SYSTEM_TYPES.has(base)) continue;
            addCall(outer, inner, it2.index);
        }

        // Capture fluent chains that start from a constructor: new ClassName().method1().method2()...
        const constructorChainRegex = /new\s+(\w+)\s*\([^)]*\)([\s\S]*?);/g;
        let cc;
        while ((cc = constructorChainRegex.exec(content)) !== null) {
            const className = cc[1];
            const target = pickClassTarget(className);
            if (!target) continue;

            const chainBody = cc[2] || '';
            const chainMethodRegex = /\.\s*(\w+)\s*\(/g;
            let chainMatch;
            while ((chainMatch = chainMethodRegex.exec(chainBody)) !== null) {
                addCall(target, chainMatch[1], cc.index + chainMatch.index);
            }
        }

        return calls;
    }

    function attachEvents() {
        bindTooltipGlobalHandlers();
        document.querySelectorAll('.node').forEach(node => {
            node.addEventListener('mouseenter', (e) => {
                // Highlight cursor only — no auto-popup
                node.style.cursor = 'pointer';
            });
            node.addEventListener('click', () => {
                if (!focusedClass) return;
                // Entry node: ClassName___methodName
                const m1 = node.id.match(/flowchart-([^-]+)___([^-]+)-/);
                if (m1 && !m1[1].startsWith('l1__') && !m1[1].startsWith('l2__')) {
                    const className = Object.keys(registry).find(k => safeId(k) === m1[1]);
                    if (className === focusedClass) {
                        const methodName = Object.keys(registry[className].methods).find(m => safeId(m) === m1[2]);
                        if (methodName && activeMethods.has(methodName)) {
                            if (collapsedMethods.has(methodName)) collapsedMethods.delete(methodName);
                            else collapsedMethods.add(methodName);
                            render(); return;
                        }
                    }
                }
                // Any depth node: lN__ClassName___methodName
                const m2 = node.id.match(/flowchart-l(\d+)__([^-]+)___([^-]+)-/);
                if (m2) {
                    const nodeId = `l${m2[1]}__${m2[2]}___${m2[3]}`;
                    if (collapsedNodes.has(nodeId)) collapsedNodes.delete(nodeId);
                    else collapsedNodes.add(nodeId);
                    render();
                }
            });
            node.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                hideCodeTooltip();
                showNodeContextMenu(e, node);
            });
            node.addEventListener('dblclick', (e) => {
                e.preventDefault();
                e.stopPropagation();
                selectNodeText(node);
            });
        });
    }

    function attachEdgeEvents(svgEl) {
        svgEl.querySelectorAll('.edgePath').forEach(edgeEl => {
            const origPath = edgeEl.querySelector('path');
            if (!origPath) return;

            // Add a wide transparent overlay path for easier hit-testing
            const hitPath = origPath.cloneNode(false);
            hitPath.style.cssText = 'stroke:transparent;stroke-width:20px;fill:none;cursor:pointer;';
            hitPath.classList.add('edge-hit-path');
            edgeEl.appendChild(hitPath);

            // Resolve source/target from Mermaid CSS classes (LS-safeId, LE-safeId)
            const cls = Array.from(edgeEl.classList);
            const lsCls = cls.find(c => c.startsWith('LS-'));
            const leCls = cls.find(c => c.startsWith('LE-'));
            if (!lsCls || !leCls) return;
            const sourceId = lsCls.slice(3);
            const targetId = leCls.slice(3);
            const sourceName = Object.keys(registry).find(k => safeId(k) === sourceId);
            const targetName = Object.keys(registry).find(k => safeId(k) === targetId);
            if (!sourceName || !targetName) return;

            [hitPath, origPath].forEach(el => {
                el.addEventListener('contextmenu', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    hideNodeContextMenu();
                    const flows = aggregateFlows(registry[sourceName].raw, registry[sourceName].varMap, sourceName);
                    const items = flows[targetName] || [];
                    showEdgeContextMenu(e, sourceName, targetName, items);
                });
            });
        });
    }

    function attachClusterEvents(svgEl) {
        svgEl.querySelectorAll('g.cluster').forEach(cluster => {
            // Resolve class name: prefer label text match against registry / known unloaded names
            const labelEl = cluster.querySelector('.cluster-label text, .nodeLabel, foreignObject span, text');
            const rawLabel = (labelEl?.textContent || '').trim();
            const labelName = rawLabel.startsWith('? ') ? rawLabel.slice(2).trim() : rawLabel;

            // Match against registry or safeId reverse-lookup
            const known = Object.keys(registry).find(k => k === labelName || safeId(k) === safeId(labelName));

            // Only attach to unloaded (ghost) class subgraphs — label starts with "? " or not in registry
            const isGhost = rawLabel.startsWith('? ') || (labelName && !known);
            if (!isGhost || !labelName) return;

            cluster.style.cursor = 'context-menu';
            const rect = cluster.querySelector('rect');
            if (rect) rect.style.cursor = 'context-menu';

            cluster.addEventListener('contextmenu', e => {
                e.preventDefault();
                e.stopPropagation();
                hideEdgeContextMenu();
                const menu = document.getElementById('node-context-menu');
                document.getElementById('ctx-toggle-nodes').style.display = 'none';
                document.getElementById('ctx-hide-children').style.display = 'none';
                document.getElementById('ctx-view-code').style.display = 'none';
                const loadEl = document.getElementById('ctx-load-class');
                loadEl.style.display = 'flex';
                loadEl.querySelector('span').textContent = `Load "${labelName}"`;
                loadEl.onclick = () => { hideNodeContextMenu(); loadClassByName(labelName); };
                const mw = 200, mh = 50;
                menu.style.left = Math.min(e.clientX, window.innerWidth - mw) + 'px';
                menu.style.top = Math.min(e.clientY, window.innerHeight - mh) + 'px';
                menu.style.display = 'block';
            });
        });
    }

    function showEdgeContextMenu(e, source, target, items) {
        const menu = document.getElementById('edge-context-menu');
        document.getElementById('edge-ctx-source').textContent = source;
        document.getElementById('edge-ctx-target').textContent = target;
        document.getElementById('edge-ctx-list').innerHTML = items.map(r => `<li>${r}</li>`).join('');
        menu.style.display = 'block';
        const mw = 280, mh = menu.offsetHeight || 120;
        menu.style.left = Math.min(e.clientX, window.innerWidth - mw) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - mh) + 'px';
    }

    function hideEdgeContextMenu() {
        document.getElementById('edge-context-menu').style.display = 'none';
    }

    function resolveNodeIdentity(node) {
        let className, methodName;
        const m1 = node.id.match(/flowchart-(.+)___(.+)-\d/);
        if (m1 && !m1[1].startsWith('l1__') && !m1[1].startsWith('l2__')) {
            className = Object.keys(registry).find(k => safeId(k) === m1[1]);
            if (className) methodName = Object.keys(registry[className]?.methods || {}).find(m => safeId(m) === m1[2]);
        }
        if (!methodName) {
            const m2 = node.id.match(/flowchart-l\d__(.+)___(.+)-\d/);
            if (m2) {
                className = Object.keys(registry).find(k => safeId(k) === m2[1]);
                if (className) methodName = Object.keys(registry[className]?.methods || {}).find(m => safeId(m) === m2[2]);
            }
        }
        return { className, methodName };
    }

    function showNodeContextMenu(e, node) {
        const menu = document.getElementById('node-context-menu');
        const { className, methodName } = resolveNodeIdentity(node);

        // Determine toggle state for Hide/Show
        let canToggle = false;
        if (focusedClass) {
            const m1 = node.id.match(/flowchart-([^-]+)___([^-]+)-/);
            const isEntry = m1 && !m1[1].match(/^l\d+__/) && className === focusedClass && methodName && activeMethods.has(methodName);
            const mDepth = node.id.match(/flowchart-l(\d+)__([^-]+)___([^-]+)-/);
            const nodeId = mDepth ? `l${mDepth[1]}__${mDepth[2]}___${mDepth[3]}` : null;
            const isDepthNode = !!nodeId;
            if (isEntry || isDepthNode) {
                canToggle = true;
                const isCollapsed = isEntry ? collapsedMethods.has(methodName) : collapsedNodes.has(nodeId);
                document.getElementById('ctx-toggle-label').textContent = isCollapsed ? 'Show Child Nodes' : 'Hide Child Nodes';
                document.getElementById('ctx-toggle-nodes').style.display = 'flex';
                document.getElementById('ctx-toggle-nodes').onclick = () => {
                    hideNodeContextMenu();
                    if (isEntry) {
                        if (collapsedMethods.has(methodName)) collapsedMethods.delete(methodName);
                        else collapsedMethods.add(methodName);
                    } else {
                        if (collapsedNodes.has(nodeId)) collapsedNodes.delete(nodeId);
                        else collapsedNodes.add(nodeId);
                    }
                    render();
                };
            } else {
                document.getElementById('ctx-toggle-nodes').style.display = 'none';
            }
        } else {
            // Outside analyze flow: toggle = open analyze flow
            document.getElementById('ctx-toggle-label').textContent = 'Analyze Flow';
            document.getElementById('ctx-toggle-nodes').style.display = 'flex';
            document.getElementById('ctx-toggle-nodes').querySelector('i').className = 'fa-solid fa-diagram-project';
            document.getElementById('ctx-toggle-nodes').onclick = () => {
                hideNodeContextMenu();
                const cn = getClassNameFromNode(node);
                if (cn) setView(cn);
            };

            // Hide / Show Children — only for loaded classes in overview
            const cn = getClassNameFromNode(node);
            const hideChildEl = document.getElementById('ctx-hide-children');
            if (cn && registry[cn]) {
                const children = getLoadedChildren(cn);
                if (children.length) {
                    const anyVisible = children.some(c => !hiddenClasses.has(c));
                    document.getElementById('ctx-hide-children-label').textContent = anyVisible ? 'Hide Children' : 'Show Children';
                    hideChildEl.querySelector('i').className = anyVisible ? 'fa-solid fa-circle-nodes' : 'fa-solid fa-circle-nodes';
                    hideChildEl.style.display = 'flex';
                    hideChildEl.onclick = () => {
                        hideNodeContextMenu();
                        if (anyVisible) children.forEach(c => hiddenClasses.add(c));
                        else children.forEach(c => hiddenClasses.delete(c));
                        render();
                    };
                } else {
                    hideChildEl.style.display = 'none';
                }
            } else {
                hideChildEl.style.display = 'none';
            }
        }

        // Load Class option — only for ghost (unloaded) nodes
        const ghostName = ghostClassFromNode(node);
        const loadEl = document.getElementById('ctx-load-class');
        loadEl.style.display = ghostName ? 'flex' : 'none';
        if (ghostName) {
            const inTree = !!findFileInTree(ghostName);
            loadEl.querySelector('span').textContent = inTree ? `Load "${ghostName}"` : `Load "${ghostName}"…`;
            loadEl.querySelector('i').className = inTree ? 'fa-solid fa-file-import' : 'fa-solid fa-folder-open';
            loadEl.onclick = () => { hideNodeContextMenu(); loadClassByName(ghostName); };
        }

        // View Code option — only if method body exists
        const hasCode = className && methodName && registry[className]?.methods?.[methodName];
        document.getElementById('ctx-view-code').style.display = hasCode ? 'flex' : 'none';
        document.getElementById('ctx-view-code').onclick = () => {
            hideNodeContextMenu();
            document.getElementById('tooltip-title').textContent = `${className}.${methodName}()`;
            document.getElementById('tooltip-code').textContent = registry[className].methods[methodName];
            Prism.highlightElement(document.getElementById('tooltip-code'));
            const tooltip = document.getElementById('code-tooltip');
            tooltip.style.display = 'flex';
            tooltip.style.left = Math.min(e.clientX + 12, window.innerWidth - 420) + 'px';
            tooltip.style.top = Math.min(e.clientY + 12, window.innerHeight - 300) + 'px';
            tooltipInteractionGuardUntil = Date.now() + 300; // prevent immediate dismiss
        };

        // Position and show
        menu.style.display = 'block';
        const menuW = 200, menuH = 110;
        menu.style.left = Math.min(e.clientX, window.innerWidth - menuW) + 'px';
        menu.style.top = Math.min(e.clientY, window.innerHeight - menuH) + 'px';
    }

    function hideNodeContextMenu() {
        document.getElementById('node-context-menu').style.display = 'none';
    }

    function setView(name) {
        focusedClass = name;
        selectedClassName = null;
        activeMethods = new Set();
        collapsedMethods = new Set();
        collapsedNodes = new Set();
        if (name) { openMethodPicker(name); } else { exitAnalyzeFlow(); }
    }

    function openMethodPicker(className, preSelectMethod) {
        document.getElementById('class-panel').style.display = 'none';
        document.getElementById('method-picker').classList.add('visible');
        document.getElementById('method-picker-classname').textContent = className;
        const listEl = document.getElementById('method-picker-list');
        listEl.innerHTML = '';

        const methods = Object.keys(registry[className].methods);
        if (preSelectMethod && methods.includes(preSelectMethod)) {
            // Drill-in: activate only the specific method, skip auto-default
            activeMethods.add(preSelectMethod);
        } else {
            // Normal open: auto-enable the method with the most lines
            let defaultMethod = methods[0];
            let maxLines = 0;
            methods.forEach(m => {
                const lines = (registry[className].methods[m].match(/\n/g) || []).length;
                if (lines > maxLines) { maxLines = lines; defaultMethod = m; }
            });
            if (defaultMethod) activeMethods.add(defaultMethod);
        }

        methods.forEach(m => {
            const calls = collectOrderedCalls(registry[className].methods[m], registry[className].varMap, className);
            const lines = (registry[className].methods[m].match(/\n/g) || []).length;
            const pill = document.createElement('div');
            pill.className = 'method-pill' + (activeMethods.has(m) ? ' enabled' : '');
            pill.innerHTML = `<span class="pill-dot"></span><span class="pill-name">${m}()</span>${calls.length > 0 ? `<span class="pill-badge">${calls.length} calls</span>` : ''}<span class="pill-badge">${lines}L</span>`;
            pill.addEventListener('click', () => {
                if (activeMethods.has(m)) { activeMethods.delete(m); pill.classList.remove('enabled'); }
                else { activeMethods.add(m); pill.classList.add('enabled'); }
                render();
            });
            listEl.appendChild(pill);
        });
        render();
    }

    function exitAnalyzeFlow() {
        focusedClass = null;
        activeMethods = new Set();
        collapsedMethods = new Set();
        collapsedNodes = new Set();
        document.getElementById('class-panel').style.display = '';
        document.getElementById('method-picker').classList.remove('visible');
        render();
    }

    async function copyCurrentMermaid() {
        if (!currentMermaidDefinition) return;

        const textToCopy = currentMermaidDefinition;
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                await navigator.clipboard.writeText(textToCopy);
            } else {
                const temp = document.createElement('textarea');
                temp.value = textToCopy;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
            }
            flashCopyButton(true);
        } catch (err) {
            console.error('Failed to copy Mermaid code', err);
            flashCopyButton(false);
        }
    }

    function flashCopyButton(success) {
        const btn = document.getElementById('copy-mermaid-btn');
        if (!btn) return;

        btn.innerHTML = success
            ? '<i class="fa-solid fa-check"></i>'
            : '<i class="fa-solid fa-triangle-exclamation"></i>';

        setTimeout(() => {
            btn.innerHTML = '<i class="fa-regular fa-copy"></i>';
        }, 1000);
    }
</script>
<div id="edge-label-tooltip"></div>
</body>
