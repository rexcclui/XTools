// ─── PARSER ───────────────────────────────────────────────────────────────────
const PUSH_EVS = new Set(['CODE_UNIT_STARTED','METHOD_ENTRY','CONSTRUCTOR_ENTRY',
  'SYSTEM_METHOD_ENTRY','VF_APEX_CALL_START','SOQL_EXECUTE_BEGIN','DML_BEGIN',
  'CALLOUT_REQUEST','FLOW_START_INTERVIEWS_BEGIN','FLOW_START_INTERVIEW_BEGIN','FLOW_ELEMENT_BEGIN']);
const EXIT_MAP = {
  CODE_UNIT_FINISHED:'CODE_UNIT_STARTED',METHOD_EXIT:'METHOD_ENTRY',
  CONSTRUCTOR_EXIT:'CONSTRUCTOR_ENTRY',SYSTEM_METHOD_EXIT:'SYSTEM_METHOD_ENTRY',
  VF_APEX_CALL_END:'VF_APEX_CALL_START',SOQL_EXECUTE_END:'SOQL_EXECUTE_BEGIN',
  DML_END:'DML_BEGIN',CALLOUT_RESPONSE:'CALLOUT_REQUEST',
  FLOW_START_INTERVIEWS_END:'FLOW_START_INTERVIEWS_BEGIN',
  FLOW_START_INTERVIEW_END:'FLOW_START_INTERVIEW_BEGIN',
  FLOW_ELEMENT_END:'FLOW_ELEMENT_BEGIN',EXECUTION_FINISHED:'EXECUTION_STARTED',
};
const SID_RE = /^01[a-zA-Z0-9]{13,16}$/;

function parseLine(raw) {
  // Fast indexOf-based parser, ~3x faster than regex for large logs
  if (raw.length < 20 || raw[2] !== ':' || raw[5] !== ':') return null;
  const sp = raw.indexOf(' ');
  if (sp < 0 || raw[sp+1] !== '(') return null;
  const cp = raw.indexOf(')', sp+2);
  if (cp < 0 || raw[cp+1] !== '|') return null;
  const p1 = cp+2;
  const p2 = raw.indexOf('|', p1);
  const ts = raw.slice(0, sp);
  const nsRaw = raw.slice(sp+2, cp);
  const ns = nsRaw.length ? parseInt(nsRaw) : 0;
  const ev = p2 < 0 ? raw.slice(p1) : raw.slice(p1, p2);
  const rest = p2 < 0 ? '' : raw.slice(p2+1);
  if (!ev || !/^[A-Z_0-9]+$/.test(ev)) return null;
  return {ts, ns, ev, rest};
}

function evType(ev) {
  return {METHOD_ENTRY:'method',CONSTRUCTOR_ENTRY:'constructor',CODE_UNIT_STARTED:'code_unit',
    SYSTEM_METHOD_ENTRY:'system_method',VF_APEX_CALL_START:'callout',SOQL_EXECUTE_BEGIN:'soql',
    DML_BEGIN:'dml',CALLOUT_REQUEST:'callout',FLOW_START_INTERVIEWS_BEGIN:'flow',
    FLOW_START_INTERVIEW_BEGIN:'flow',FLOW_ELEMENT_BEGIN:'flow'}[ev]||'other';
}

function evMeta(ev, rest) {
  const p = rest.split('|');
  if (ev==='METHOD_ENTRY'||ev==='CONSTRUCTOR_ENTRY'||ev==='SYSTEM_METHOD_ENTRY'||
      ev==='METHOD_EXIT' ||ev==='CONSTRUCTOR_EXIT' ||ev==='SYSTEM_METHOD_EXIT' ||
      ev==='VF_APEX_CALL_START'||ev==='VF_APEX_CALL_END') {
    const lr=p[0]||'';
    const hasCid=p.length>=3&&(SID_RE.test(p[1])||p[1]==='');
    const sig=hasCid?p.slice(2).join('|'):p.slice(1).join('|');
    const pL=sig.indexOf('('),pR=sig.lastIndexOf(')');
    const namePart=pL>=0?sig.slice(0,pL):sig;
    const params=pL>=0&&pR>pL?sig.slice(pL+1,pR):'';
    const dot=namePart.lastIndexOf('.');
    const cls=dot>=0?namePart.slice(0,dot):'';
    const meth=dot>=0?namePart.slice(dot+1):namePart;
    return {cls,meth,params,sig,lr};
  }
  if (ev==='CODE_UNIT_STARTED') {
    const hasCid=p.length>=3&&SID_RE.test(p[1]);
    const name=(hasCid?p.slice(2):p.slice(1)).join('|')||p[0];
    return {cls:'',meth:name,params:'',sig:'',lr:p[0],subtype:/trigger/i.test(name)?'trigger':null};
  }
  if (ev==='SOQL_EXECUTE_BEGIN') {
    const q=p.slice(2).join('|');
    return {cls:'',meth:'SOQL',params:'',sig:q||p[1]||'',lr:p[0]};
  }
  if (ev==='DML_BEGIN') {
    return {cls:'',meth:`DML ${p[1]||''}`,params:'',sig:`${p[2]||''} ${p[3]?p[3]+' rows':''}`.trim(),lr:p[0]};
  }
  if (ev==='CALLOUT_REQUEST') {
    const ep=p.find(x=>x.startsWith('Endpoint='))||p[0]||'';
    const mt=p.find(x=>x.startsWith('Method='))||'';
    return {cls:'',meth:'HTTP Callout',params:'',sig:`${mt} ${ep}`.trim(),lr:''};
  }
  if (ev==='USER_DEBUG') {
    const msg=p.slice(2).join('|');
    return {cls:'',meth:msg||'(empty)',params:'',sig:'',lr:p[0],level:p[1]||'DEBUG'};
  }
  if (ev==='VARIABLE_ASSIGNMENT') {
    const parts=p.slice(2);
    if (parts.length>0&&/^0x[0-9a-f]+$/i.test(parts[parts.length-1])) parts.pop();
    return {cls:'',meth:p[1]||'',params:'',sig:parts.join('|'),lr:p[0]||''};
  }
  if (ev==='EXCEPTION_THROWN'||ev==='FATAL_ERROR') {
    return {cls:'',meth:p.slice(1).join('|')||rest||'Exception',params:'',sig:'',lr:p[0]||''};
  }
  // default: extract lr from p[0] if it looks like [N]
  const lr=/^\[\d+\]$/.test(p[0])?p[0]:'';
  return {cls:'',meth:rest||ev,params:'',sig:'',lr};
}

const PARSE_CHUNK = 8000; // lines per async tick
const RAW_INLINE_LIMIT = 1024 * 1024; // 1 MB — above this, show a size hint in the input tab

async function parseLogAsync(text, onProgress) {
  const rawLines=text.split('\n');
  const stats={methods:0,soql:0,dml:0,exc:0,lines:rawLines.length};
  const namespaces=new Set();
  const eventTypeCounts=new Map();
  const logLines=[];
  let seq=0;
  const root={id:'root',type:'execution',cls:'',meth:'Execution',params:'',sig:'',lr:'',
    ts:'',ns:0,endNs:0,dur:0,children:[],expanded:true,rowCount:null,calloutResp:null};
  const stack=[root];
  const cur=()=>stack[stack.length-1];
  for (let i=0;i<rawLines.length;i++) {
    // yield to browser every PARSE_CHUNK lines so UI stays responsive
    if (i>0&&i%PARSE_CHUNK===0){
      onProgress&&onProgress(i/rawLines.length);
      await new Promise(r=>setTimeout(r,0));
    }
    const raw=rawLines[i].trim();
    if (!raw) continue;
    const pl=parseLine(raw);
    if (!pl){logLines.push({idx:i,ns:0,ts:'',ev:'',rest:raw,raw,depth:Math.max(0,stack.length-1)});continue}
    const {ts,ns,ev,rest}=pl;
    // depth: exit lines match their entry level; push lines are at current depth before push
    const depth=EXIT_MAP[ev]&&ev!=='EXECUTION_FINISHED'
      ? Math.max(0,stack.length-2)
      : Math.max(0,stack.length-1);
    logLines.push({idx:i,ns,ts,ev,rest,raw,depth});
    if (ev) eventTypeCounts.set(ev,(eventTypeCounts.get(ev)||0)+1);
    if (ev==='EXECUTION_STARTED'){root.ts=ts;root.ns=ns;continue}
    if (ev==='EXECUTION_FINISHED'){root.endNs=ns;root.dur=ns-root.ns;continue}
    if (EXIT_MAP[ev]) {
      if (stack.length>1) {
        const n=stack.pop();n.endNs=ns;n.dur=ns-n.ns;n.logEndIdx=logLines.length-1;
        if (ev==='SOQL_EXECUTE_END'){const m=rest.match(/Rows:(\d+)/i);if(m)n.rowCount=m[1]}
        if (ev==='CALLOUT_RESPONSE'){const sc=rest.match(/StatusCode=(\d+)/);if(sc)n.calloutResp=`HTTP ${sc[1]}`}
      }
      continue;
    }
    if (ev==='USER_DEBUG') {
      const m=evMeta(ev,rest);
      cur().children.push({id:`n${++seq}`,type:'debug',cls:'',meth:m.meth,params:'',sig:'',lr:m.lr,
        ts,ns,endNs:ns,dur:0,children:[],expanded:false,level:m.level});
      continue;
    }
    if (ev==='VARIABLE_ASSIGNMENT') {
      const m=evMeta(ev,rest);
      cur().children.push({id:`n${++seq}`,type:'varAssign',cls:'',meth:m.meth,params:'',sig:m.sig,lr:m.lr,
        ts,ns,endNs:ns,dur:0,children:[],expanded:false});
      continue;
    }
    if (ev==='EXCEPTION_THROWN'||ev==='FATAL_ERROR') {
      const m=evMeta(ev,rest);
      cur().children.push({id:`n${++seq}`,type:'exception',cls:'',meth:m.meth,params:'',sig:'',lr:m.lr,
        ts,ns,endNs:ns,dur:0,children:[],expanded:false});
      stats.exc++;continue;
    }
    if (PUSH_EVS.has(ev)) {
      const m=evMeta(ev,rest);
      const nt=m.subtype||evType(ev);
      const node={id:`n${++seq}`,type:nt,eventType:ev,cls:m.cls,meth:m.meth,params:m.params,sig:m.sig,lr:m.lr,
        ts,ns,endNs:ns,dur:0,children:[],expanded:nt!=='system_method',rowCount:null,calloutResp:null,logIdx:logLines.length-1};
      if (nt==='method'||nt==='constructor') stats.methods++;
      if (nt==='soql') stats.soql++;
      if (nt==='dml') stats.dml++;
      if (m.cls){const nsm=m.cls.match(/^([a-zA-Z][a-zA-Z0-9]+)__/)||(m.cls.includes('.')?m.cls.match(/^([a-zA-Z][a-zA-Z0-9]*)\./):null);if(nsm)namespaces.add(nsm[1])}
      cur().children.push(node);
      stack.push(node);
    }
  }
  return {tree:root,stats,logLines,namespaces,eventTypes:eventTypeCounts};
}

const BLOCK_TYPES=new Set(['execution','code_unit','trigger','method','constructor','soql','dml','callout','flow']);
function findBlockAtNs(root,ns){
  let best=null;
  function walk(node){
    if (!BLOCK_TYPES.has(node.type)) {node.children.forEach(walk);return}
    if (node.ns>ns||(node.endNs>0&&node.endNs<ns)) return;
    best=node;
    node.children.forEach(walk);
  }
  walk(root);
  return best;
}

// Returns chain from outermost to innermost block containing ns
function findBlockChainAtNs(root,ns){
  const chain=[];
  function walk(node){
    if (!BLOCK_TYPES.has(node.type)){node.children.forEach(walk);return}
    if (node.ns>ns||(node.endNs>0&&node.endNs<ns)) return;
    chain.push(node);
    node.children.forEach(walk);
  }
  walk(root);
  return chain;
}

function fmtDur(ns) {
  if (!ns||ns<=0) return '';
  const ms=ns/1e6;
  if (ms<0.01) return `${(ns/1000).toFixed(0)}μs`;
  if (ms<1000) return `${ms.toFixed(ms<10?2:1)}ms`;
  return `${(ms/1000).toFixed(3)}s`;
}

// ─── ENGINE ───────────────────────────────────────────────────────────────────
function initAnalyzer(rootEl, fetchSource) {
  // Inject styles
  const styleEl = document.createElement('style');
  styleEl.textContent = CSS;
  rootEl.appendChild(styleEl);

  // Build the analyzer container
  const C = document.createElement('div');
  C.className = 'sda';
  C.style.position = 'relative';
  C.innerHTML = HTML;
  rootEl.appendChild(C);

  // DOM helpers — scoped to the analyzer container
  const $ = id => C.querySelector('#' + id);
  const $$ = sel => Array.from(C.querySelectorAll(sel));

  // ── State ──────────────────────────────────────────────────────────────────
  const HL_COLORS = [
    {bg:'#e8c000',fg:'#000',border:'#cca800'},
    {bg:'#00aaaa',fg:'#000',border:'#008b8b'},
    {bg:'#d63384',fg:'#fff',border:'#c71585'},
    {bg:'#2d9e50',fg:'#fff',border:'#228b22'},
  ];
  const S = {
    tabs:[],activeId:null,
    highlights:HL_COLORS.map((c,i)=>({id:i+1,query:'',bg:c.bg,fg:c.fg,border:c.border})),
    typeFilter:new Set(),showDebug:true,showSystem:false,showVarAssign:true,showTiming:true,showLogIndent:false,wrapLogLines:false,
    nsFilter:null,hiddenNsLines:new Set(),hideKeywords:[],hiddenEventTypes:new Set(['HEAP_ALLOCATE','STATEMENT_EXECUTE']),treeSearch:'',
  };
  let tabSeq = 0;

  // ── Highlight helpers ──────────────────────────────────────────────────────
  function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
  function getActiveHls(){return S.highlights.filter(h=>h.query.trim())}

  function applyHl(text,hls){
    if (!hls.length) return escHtml(text);
    const ranges=[];
    for (const h of hls){
      const q=h.query.toLowerCase(),t=text.toLowerCase();
      let i=0;
      while (i<t.length){const p=t.indexOf(q,i);if(p<0)break;ranges.push({s:p,e:p+h.query.length,bg:h.bg,fg:h.fg});i=p+1}
    }
    if (!ranges.length) return escHtml(text);
    ranges.sort((a,b)=>a.s-b.s);
    let html='',cur=0;
    for (const r of ranges){
      if (r.s<cur) continue;
      html+=escHtml(text.slice(cur,r.s));
      html+=`<mark style="background:${r.bg};color:${r.fg}">${escHtml(text.slice(r.s,r.e))}</mark>`;
      cur=r.e;
    }
    return html+escHtml(text.slice(cur));
  }

  function hlMatchesBg(text,hls){
    for (const h of hls){if(h.query&&text.toLowerCase().includes(h.query.toLowerCase()))return{bg:h.bg,fg:h.fg}}
    return null;
  }

  // ── Log renderer (virtual scroll) ─────────────────────────────────────────
  const LOG_ROW_H = 18; // must match .ll height in CSS
  const LOG_OVERSCAN = 50;

  function stripSids(s){return s.replace(/\|01[a-zA-Z0-9]{13,16}(?=\|)/g,'')}

  function buildFoldableMap(tree,logLines){
    const map=new Map();
    function walk(node){
      if (node.logIdx!==undefined&&node.logEndIdx!==undefined&&logLines[node.logIdx]&&logLines[node.logEndIdx])
        map.set(logLines[node.logIdx].idx,{endRawIdx:logLines[node.logEndIdx].idx,folded:false});
      node.children.forEach(walk);
    }
    walk(tree);
    return map;
  }

  function computeVisibleLines(tab){
    const kws=S.hideKeywords,hEvs=S.hiddenEventTypes,hNs=S.hiddenNsLines;
    if (!kws.length&&!hEvs.size&&!hNs.size&&!tab._hasFolds) return tab.logLines;
    return tab.logLines.filter(ll=>{
      if (ll._folded) return false;
      if (ll.ev&&hEvs.has(ll.ev)) return false;
      if (hNs.size&&ll.nsTag&&hNs.has(ll.nsTag)) return false;
      if (kws.length&&kws.some(k=>ll.raw.toLowerCase().includes(k))) return false;
      return true;
    });
  }

  // Tag each log line with its namespace using a call-stack approach so that
  // Tag each log line with its namespace using a call-stack approach so that
  // VARIABLE_ASSIGNMENT / USER_DEBUG / etc. inside a namespace method also get
  // tagged, not just the METHOD_ENTRY line itself.
  function tagLineNamespaces(logLines){
    if(!logLines.length||logLines[0].nsTag!==undefined) return;
    const NS_RE=/\|([a-zA-Z][a-zA-Z0-9]*)(?:\.|__)/;
    function restNs(rest){if(!rest)return'';const m=rest.match(NS_RE);return m?m[1]:'';}
    const nsStack=[''];
    for(let i=0;i<logLines.length;i++){
      const ll=logLines[i];
      const curNs=nsStack[nsStack.length-1];
      if(PUSH_EVS.has(ll.ev)){
        // SYSTEM_METHOD_ENTRY always runs on behalf of the caller — don't extract
        // its own "System" namespace, just inherit the enclosing namespace so that
        // hiding e.g. fferpcore also hides System.debug calls made inside it.
        const myNs=ll.ev==='SYSTEM_METHOD_ENTRY'?'':restNs(ll.rest);
        ll.nsTag=myNs||curNs;
        nsStack.push(ll.nsTag);
      } else if(EXIT_MAP[ll.ev]&&ll.ev!=='EXECUTION_FINISHED'){
        ll.nsTag=curNs;
        if(nsStack.length>1) nsStack.pop();
      } else {
        ll.nsTag=curNs;
      }
    }
  }

  function buildLogRow(ll,tab,hls,visIdx){
    const isActive=tab._cursorVisIdx===visIdx;
    const inBlock=!!(tab._blockRange&&ll.ns>0&&ll.ns>=tab._blockRange.startNs&&ll.ns<=tab._blockRange.endNs);
    const div=document.createElement('div');
    div.className=`ll ev-${ll.ev}${isActive?' active':''}${inBlock?' ll-block':''}`;
    div.dataset.ns=ll.ns;div.dataset.idx=ll.idx;div.dataset.ev=ll.ev;div.dataset.visidx=visIdx;
    const num=document.createElement('span');num.className='ll-num';num.textContent=ll.idx+1;
    div.appendChild(num);
    if (tab._foldableMap?.has(ll.idx)){
      const fi=tab._foldableMap.get(ll.idx);
      const tog=document.createElement('span');tog.className='ll-fold-tog';
      tog.textContent=fi.folded?'▶':'▼';tog.title=fi.folded?'Expand block':'Collapse block';
      tog.addEventListener('click',e=>{
        e.stopPropagation();
        fi.folded=!fi.folded;
        tab._hasFolds=[...tab._foldableMap.values()].some(f=>f.folded);
        for (const lll of tab.logLines){
          if (lll.idx>ll.idx&&lll.idx<=fi.endRawIdx) lll._folded=fi.folded;
        }
        tab._logScroller?.refresh();
      });
      div.appendChild(tog);
    }
    if (S.showLogIndent&&ll.depth>0){
      const ind=document.createElement('span');ind.className='ll-ind';
      // two non-breaking spaces per depth level, with subtle pipe guides
      ind.textContent=('\xa0\xa0│').repeat(ll.depth-1)+'\xa0\xa0┤';
      div.appendChild(ind);
    }
    if (ll.ev){
      const ts=document.createElement('span');ts.className='ll-ts';ts.textContent=ll.ts;
      const ev=document.createElement('span');ev.className='ll-ev';ev.innerHTML=applyHl(ll.ev,hls);
      const rest=document.createElement('span');rest.className='ll-rest';rest.innerHTML=applyHl(stripSids(ll.rest),hls);
      div.appendChild(ts);div.appendChild(ev);div.appendChild(rest);
      // hover source button
      const m=evMeta(ll.ev,ll.rest);
      const srcCls=m.cls||(m.lr&&tab.tree?([...findBlockChainAtNs(tab.tree,ll.ns)].reverse().find(n=>n.cls)?.cls||''):'');
      if (srcCls){
        const sb=document.createElement('span');sb.className='ll-src-btn';sb.textContent='⌗';sb.title='View source: '+srcCls;
        sb.addEventListener('click',e=>{e.stopPropagation();showSnippet(srcCls,m.lr||'');});
        div.appendChild(sb);
      }
    } else {
      const raw=document.createElement('span');raw.className='ll-rest';raw.innerHTML=applyHl(ll.raw,hls);
      div.appendChild(raw);
    }
    div.addEventListener('click',()=>{
      tab._cursorVisIdx=visIdx;
      syncLogToTree(tab,ll.ns,div);
    });
    return div;
  }

  function makeLogScroller(container,tab){
    let visLines=computeVisibleLines(tab);
    tab._visLines=visLines;
    let rendered={start:-1,end:-1};
    const spacer=document.createElement('div');spacer.style.cssText='position:relative;';
    const rowsEl=document.createElement('div');rowsEl.style.cssText='position:absolute;top:0;left:0;right:0;will-change:transform;';
    spacer.appendChild(rowsEl);
    container.appendChild(spacer);

    function render(){
      // Wrap mode: bypass virtualization so variable row heights render correctly.
      if (S.wrapLogLines){
        spacer.style.height='auto';
        rowsEl.style.transform='none';
        if (rendered.start===0&&rendered.end===visLines.length) return;
        rendered={start:0,end:visLines.length};
        const hls=getActiveHls();
        const frag=document.createDocumentFragment();
        for (let i=0;i<visLines.length;i++) frag.appendChild(buildLogRow(visLines[i],tab,hls,i));
        rowsEl.innerHTML='';rowsEl.appendChild(frag);
        return;
      }
      const scrollTop=container.scrollTop;
      const viewH=container.clientHeight||600;
      spacer.style.height=(visLines.length*LOG_ROW_H)+'px';
      const start=Math.max(0,Math.floor(scrollTop/LOG_ROW_H)-LOG_OVERSCAN);
      const end=Math.min(visLines.length,Math.ceil((scrollTop+viewH)/LOG_ROW_H)+LOG_OVERSCAN);
      if (start===rendered.start&&end===rendered.end) return;
      rendered={start,end};
      rowsEl.style.transform=`translateY(${start*LOG_ROW_H}px)`;
      const hls=getActiveHls();
      const frag=document.createDocumentFragment();
      for (let i=start;i<end;i++) frag.appendChild(buildLogRow(visLines[i],tab,hls,i));
      rowsEl.innerHTML='';rowsEl.appendChild(frag);
    }

    function scrollToVisIdx(idx,center){
      if (S.wrapLogLines){
        const row=rowsEl.children[idx];
        if (row) row.scrollIntoView({block:center?'center':'nearest'});
        return;
      }
      const rowTop=idx*LOG_ROW_H;
      const rowBot=rowTop+LOG_ROW_H;
      const viewTop=container.scrollTop;
      const viewBot=viewTop+container.clientHeight;
      if (center||rowTop<viewTop) container.scrollTop=Math.max(0,rowTop-(container.clientHeight/2));
      else if (rowBot>viewBot) container.scrollTop=rowBot-container.clientHeight;
      rendered={start:-1,end:-1};render();
    }

    container.addEventListener('scroll',()=>render(),{passive:true});

    return {
      refresh(newVis){visLines=newVis??computeVisibleLines(tab);tab._visLines=visLines;rendered={start:-1,end:-1};render()},
      scrollToNs(ns){
        const idx=visLines.findIndex(ll=>ll.ns===ns);
        if (idx<0) return null;
        scrollToVisIdx(idx,true);
        return rowsEl.querySelector(`.ll[data-ns="${ns}"]`);
      },
      scrollToVisIdx,
      scrollToFirst(pred){
        const idx=visLines.findIndex(pred);
        if (idx>=0) scrollToVisIdx(idx,true);
      },
      forceRender:render,
      pageSize(){return Math.max(1,Math.floor(container.clientHeight/LOG_ROW_H)-1)},
    };
  }

  // ── Block highlight ────────────────────────────────────────────────────────
  function highlightBlock(tab,ns){
    if (!tab.tree) return;
    const node=findBlockAtNs(tab.tree,ns);
    if (!node||node.endNs<=0) return;
    tab._blockRange={startNs:node.ns,endNs:node.endNs,label:`${node.cls?node.cls+'.':''}${node.meth}`};
    tab._logScroller?.refresh();
  }

  function clearBlock(tab){
    tab._blockRange=null;
    tab._logScroller?.refresh();
  }

  let _ctxMenu=null;
  function closeLogContextMenu(){if(_ctxMenu){_ctxMenu.remove();_ctxMenu=null}}

  function applyHighlight(query){
    const slot=S.highlights.find(h=>!h.query.trim());
    if (!slot) return false;
    slot.query=query;
    renderHlSlots();
    rerenderHighlights();
    return true;
  }

  function jumpToNs(tab,targetNs){
    const vis=tab._visLines||[];
    const idx=vis.findIndex(ll=>ll.ns===targetNs);
    if (idx>=0){moveLogCursor(tab,idx);return true}
    return false;
  }

  function sep(menu){const d=document.createElement('div');d.className='log-ctx-sep';menu.appendChild(d)}

  function rowFromNode(node){
    let n=node;
    while(n&&n!==document.body){
      if(n.classList&&n.classList.contains('ll')) return n;
      n=n.parentNode;
    }
    return null;
  }

  function getRowRawText(tab,rowEl){
    if(!rowEl) return '';
    const vis=tab._visLines||[];
    const vi=parseInt(rowEl.dataset.visidx||'-1',10);
    if(Number.isFinite(vi)&&vi>=0&&vis[vi]) return vis[vi].raw||'';
    const ns=parseInt(rowEl.dataset.ns||'0',10);
    const ll=vis.find(l=>l.ns===ns)||(tab.logLines||[]).find(l=>l.ns===ns);
    return ll?.raw||rowEl.textContent||'';
  }

  function getSelectedRowsText(tab,rowEl){
    const sel=window.getSelection?.();
    if(!sel||sel.rangeCount===0) return '';
    const a=rowFromNode(sel.anchorNode),b=rowFromNode(sel.focusNode);
    if(!a||!b||a===b) return '';
    const ai=parseInt(a.dataset.visidx||'-1',10),bi=parseInt(b.dataset.visidx||'-1',10);
    if(!Number.isFinite(ai)||!Number.isFinite(bi)||ai<0||bi<0) return '';
    const vis=tab._visLines||[];
    const s=Math.min(ai,bi),e=Math.max(ai,bi);
    if(!vis.length||s>=vis.length) return '';
    const out=[];
    for(let i=s;i<=e&&i<vis.length;i++) out.push(vis[i].raw||'');
    return out.join('\n');
  }

  async function copyTextToClipboard(text){
    const val=String(text||'');
    if(!val) return false;
    try{
      if(navigator.clipboard?.writeText){
        await navigator.clipboard.writeText(val);
        return true;
      }
    }catch(_){/* fallback below */}
    try{
      const ta=document.createElement('textarea');
      ta.value=val;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.focus();ta.select();
      const ok=document.execCommand('copy');
      ta.remove();
      return !!ok;
    }catch(_){return false;}
  }

  function showLogContextMenu(e,tab,ns,sel='',rowEl=null){
    closeLogContextMenu();
    const menu=document.createElement('div');menu.className='log-ctx-menu';_ctxMenu=menu;
    const vis=tab._visLines||[];
    const ll=vis.find(l=>l.ns===ns)||(tab.logLines||[]).find(l=>l.ns===ns);

    function item(text,cls,fn){
      const d=document.createElement('div');d.className='log-ctx-item'+(cls?' '+cls:'');d.textContent=text;
      d.addEventListener('click',()=>{closeLogContextMenu();fn()});
      menu.appendChild(d);
    }
    function lbl(text){
      const d=document.createElement('div');d.className='log-ctx-label';d.textContent=text;menu.appendChild(d);
    }
    function disabledItem(text,reason){
      const d=document.createElement('div');d.className='log-ctx-item disabled';
      const t=document.createElement('span');t.textContent=text;d.appendChild(t);
      if (reason){const r=document.createElement('span');r.className='ctx-reason';r.textContent=reason;d.appendChild(r)}
      menu.appendChild(d);
    }

    // ── block info + jump ──────────────────────────────────────────────────
    const chain=tab.tree&&ns>0?findBlockChainAtNs(tab.tree,ns):[];
    const block=chain.length?chain[chain.length-1]:null;
    if (block&&block.type!=='execution'){
      const info=document.createElement('div');info.className='log-ctx-info';
      // build breadcrumb: show up to last 2 meaningful frames
      const frames=chain.filter(n=>n.type!=='execution');
      const label=frames.length>=2
        ? ((frames[frames.length-2].cls?frames[frames.length-2].cls+'.':'')+frames[frames.length-2].meth+
           ' → '+(block.cls?block.cls+'.':'')+block.meth)
        : ((block.cls?block.cls+'.':'')+block.meth);
      const lineCount=(tab.logLines||[]).filter(ll=>ll.ns>=block.ns&&ll.ns<=block.endNs).length;
      const dur=block.dur>0?fmtDur(block.dur):'—';
      const name=document.createElement('div');name.className='log-ctx-info-name';
      name.title=label;name.textContent=label;
      const meta=document.createElement('div');meta.className='log-ctx-info-meta';
      meta.textContent=`${lineCount} lines · ${dur}`;
      info.appendChild(name);info.appendChild(meta);menu.appendChild(info);
      item('↑ Jump to entry','',()=>jumpToNs(tab,block.ns));
      if (block.endNs>0) item('↓ Jump to exit','',()=>jumpToNs(tab,block.endNs));
      sep(menu);
    } else if (ll?.ev){
      lbl(ll.ev);
    }

    // ── view source ──────────────────────────────────────────────────────
    if (ll?.ev){
      const m=evMeta(ll.ev,ll.rest);
      const lrTxt=m.lr?':'+m.lr.replace(/[\[\]]/g,''):'';
      const hasSourceLoaded=_srcFileMap.size>0;
      if (m.cls){
        if (hasSourceLoaded){
          item(`⌗ View source: ${m.cls}${lrTxt}`, '', ()=>{
            closeLogContextMenu();
            showSnippet(m.cls, m.lr||'', rowEl);
          });
        } else {
          disabledItem(`⌗ View source: ${m.cls}${lrTxt}`, 'load source folder first');
        }
        sep(menu);
      } else if (m.lr) {
        // event has a line ref but no class of its own — infer the enclosing class
        const chainCls=chain.length?[...chain].reverse().find(n=>n.cls)?.cls:'';
        if (chainCls){
          if (hasSourceLoaded){
            item(`⌗ View source: ${chainCls}${lrTxt}`, '', ()=>{
              closeLogContextMenu();
              showSnippet(chainCls, m.lr||'', rowEl);
            });
          } else {
            disabledItem(`⌗ View source: ${chainCls}${lrTxt}`, 'load source folder first');
          }
        } else {
          disabledItem('⌗ View source', 'no Apex class for this line (anonymous/system code)');
        }
        sep(menu);
      }
    }

    // ── copy line / multiline ────────────────────────────────────────────
    const lineText=getRowRawText(tab,rowEl);
    const selectedRowsText=getSelectedRowsText(tab,rowEl);
    const hasSelText=!!sel;
    item('Copy this line','',async()=>{
      const text=selectedRowsText||lineText;
      await copyTextToClipboard(text);
    });
    if (selectedRowsText){
      item('Copy selected lines','',async()=>{await copyTextToClipboard(selectedRowsText)});
    } else if (hasSelText) {
      item('Copy selected text','',async()=>{await copyTextToClipboard(sel)});
    }
    sep(menu);

    // ── highlight selection ───────────────────────────────────────────────
    if (sel){
      const freeSlot=S.highlights.find(h=>!h.query.trim());
      const label=sel.length>32?sel.slice(0,32)+'…':sel;
      if (freeSlot){
        item(`Highlight "${label}" → H${freeSlot.id}`,'',()=>applyHighlight(sel));
      } else {
        const d=document.createElement('div');d.className='log-ctx-item';
        d.style.cssText='opacity:.45;cursor:default';
        d.textContent='No free highlight slot (H1–H4 all used)';
        menu.appendChild(d);
      }
      sep(menu);
    }

    // ── block highlight ───────────────────────────────────────────────────
    item('Show current block','',()=>highlightBlock(tab,ns));
    if (tab._blockRange){
      sep(menu);
      lbl('Block: '+tab._blockRange.label.slice(0,28));
      item('Clear block highlight','danger',()=>clearBlock(tab));
    }

    document.body.appendChild(menu);
    const mw=300;
    menu.style.minWidth=mw+'px';
    menu.style.left=Math.min(e.clientX,window.innerWidth-mw-4)+'px';
    menu.style.top=Math.min(e.clientY,window.innerHeight-menu.offsetHeight-4)+'px';
  }

  document.addEventListener('click',e=>{if(_ctxMenu&&!_ctxMenu.contains(e.target))closeLogContextMenu()},true);
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLogContextMenu();closeLogTagsModal();closeSnippet();$('helpModal')?.classList.remove('open');}});

  function moveLogCursor(tab,newIdx){
    const vis=tab._visLines||[];
    if (!vis.length) return;
    newIdx=Math.max(0,Math.min(vis.length-1,newIdx));
    tab._cursorVisIdx=newIdx;
    const ll=vis[newIdx];
    tab._activeLogNs=ll.ns;
    tab._logScroller?.scrollToVisIdx(newIdx,false);
    // update tree selection
    $$('.nrow.active').forEach(e=>e.classList.remove('active'));
    const nodeEl=C.querySelector(`.nrow[data-ns="${ll.ns}"]`);
    if (nodeEl){
      nodeEl.classList.add('active');
      let p=nodeEl.parentElement;
      while (p&&!p.classList.contains('tree-content')){
        if (p.classList.contains('nchildren')) p.style.display='block';
        p=p.parentElement;
      }
      nodeEl.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }

  function renderLogView(tab){
    tab._cursorVisIdx=-1;
    const wrap=document.createElement('div');
    wrap.className='log-rendered'+(S.wrapLogLines?' wrap-on':'');
    wrap.id='logRendered_'+tab.id;
    wrap.tabIndex=0;
    wrap.setAttribute('aria-label','Log lines — use arrow keys to navigate');

    wrap.addEventListener('contextmenu',e=>{
      e.preventDefault();
      const rowEl=e.target.closest('.ll');
      if (!rowEl) return;
      const ns=parseInt(rowEl.dataset.ns);
      // capture selection before the menu causes it to collapse
      const sel=window.getSelection()?.toString().trim()||'';
      showLogContextMenu(e,tab,ns,sel,rowEl);
    });

    wrap.addEventListener('keydown',e=>{
      const vis=tab._visLines||[];
      if (!vis.length) return;
      const cur=tab._cursorVisIdx<0?0:tab._cursorVisIdx;
      const ps=tab._logScroller?.pageSize()??20;
      let next=-1;
      if (e.key==='ArrowDown')  {next=cur+1;e.preventDefault()}
      else if (e.key==='ArrowUp')    {next=cur-1;e.preventDefault()}
      else if (e.key==='PageDown')   {next=cur+ps;e.preventDefault()}
      else if (e.key==='PageUp')     {next=cur-ps;e.preventDefault()}
      else if (e.key==='Home')       {next=0;e.preventDefault()}
      else if (e.key==='End')        {next=vis.length-1;e.preventDefault()}
      if (next>=0) moveLogCursor(tab,next);
    });

    // Scroller needs actual layout — init after element is in DOM
    setTimeout(()=>{
      tab._logScroller=makeLogScroller(wrap,tab);
      tab._logScroller.forceRender();
      const hls=getActiveHls();
      if (hls.length){
        tab._logScroller.scrollToFirst(ll=>hls.some(h=>h.query&&ll.raw.toLowerCase().includes(h.query.toLowerCase())));
      }
    },0);
    return {el:wrap};
  }

  function syncLogToTree(tab,ns,lineEl){
    $$('.ll.active').forEach(e=>e.classList.remove('active'));
    $$('.nrow.active').forEach(e=>e.classList.remove('active'));
    tab._activeLogNs=ns;
    if (lineEl){
      lineEl.classList.add('active');
      // keep _cursorVisIdx in sync when row is clicked directly
      const vi=lineEl.dataset.visidx;
      if (vi!=null) tab._cursorVisIdx=parseInt(vi);
    }
    const nodeEl=C.querySelector(`.nrow[data-ns="${ns}"]`);
    if (nodeEl){
      nodeEl.classList.add('active');
      let p=nodeEl.parentElement;
      while (p&&!p.classList.contains('tree-content')){
        if (p.classList.contains('nchildren')) p.style.display='block';
        p=p.parentElement;
      }
      nodeEl.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }

  function syncTreeToLog(tab,ns){
    tab._activeLogNs=ns;
    $$('.ll.active').forEach(e=>e.classList.remove('active'));
    if (!tab._logScroller) return;
    const rowEl=tab._logScroller.scrollToNs(ns);
    if (rowEl){
      rowEl.classList.add('active');
      const vi=rowEl.dataset.visidx;
      if (vi!=null) tab._cursorVisIdx=parseInt(vi);
    }
  }

  // ── Tree renderer ──────────────────────────────────────────────────────────
  const TCFG = {
    execution:{ic:'⚡',badge:null,bc:''},code_unit:{ic:'◈',badge:'unit',bc:'bg-unit'},
    trigger:{ic:'⚡',badge:'trigger',bc:'bg-trigger'},method:{ic:'▸',badge:'method',bc:'bg-method'},
    constructor:{ic:'⊕',badge:'new',bc:'bg-constructor'},system_method:{ic:'⚙',badge:'sys',bc:'bg-sys'},
    soql:{ic:'⬡',badge:'soql',bc:'bg-soql'},dml:{ic:'💾',badge:'dml',bc:'bg-dml'},
    debug:{ic:'·',badge:'dbg',bc:'bg-debug'},exception:{ic:'✖',badge:'exc',bc:'bg-exc'},
    callout:{ic:'↗',badge:'http',bc:'bg-http'},flow:{ic:'⟳',badge:'flow',bc:'bg-flow'},
    varAssign:{ic:'≔',badge:'var',bc:'bg-var'},
    other:{ic:'·',badge:null,bc:''},
  };

  function nsMatchesFilter(cls){
    if (!S.nsFilter||!S.nsFilter.size) return true;
    const m=cls.match(/^([a-zA-Z][a-zA-Z0-9]+)__/)||(cls.includes('.')?cls.match(/^([a-zA-Z][a-zA-Z0-9]*)\./):null);
    return S.nsFilter.has(m?m[1]:'(none)');
  }
  function nodeText(node){return`${node.cls} ${node.meth} ${node.params} ${node.sig}`.toLowerCase()}
  function subtreeHasSearchMatch(node){
    if (!S.treeSearch) return true;
    const q=S.treeSearch.toLowerCase();
    if (nodeText(node).includes(q)) return true;
    return node.children.some(c=>subtreeHasSearchMatch(c));
  }
  function subtreeHasMatch(node){
    if (!nodeVisible(node)) return false;
    if (!S.typeFilter.size) return true;
    const direct=S.typeFilter.has(node.type)||(S.typeFilter.has('method')&&node.type==='constructor');
    return direct||node.children.some(c=>subtreeHasMatch(c));
  }
  function nodeVisible(node){
    if (node.type==='debug'&&!S.showDebug) return false;
    if (node.type==='system_method'&&!S.showSystem) return false;
    if (node.type==='varAssign'&&!S.showVarAssign) return false;
    if (S.typeFilter.size){
      const direct=S.typeFilter.has(node.type)||(S.typeFilter.has('method')&&node.type==='constructor');
      if (!direct&&!node.children.some(c=>subtreeHasMatch(c))) return false;
    }
    if ((node.type==='method'||node.type==='constructor')&&node.cls&&!nsMatchesFilter(node.cls)) return false;
    if (S.hideKeywords.length){const t=nodeText(node);if(S.hideKeywords.some(k=>t.includes(k)))return false}
    if (S.treeSearch){const t=nodeText(node);if(!t.includes(S.treeSearch.toLowerCase())&&!node.children.some(c=>subtreeHasSearchMatch(c)))return false}
    return true;
  }

  function groupVarKids(els){
    const out=[];let i=0;
    while(i<els.length){
      if(!els[i].classList.contains('t-varAssign')){out.push(els[i++]);continue}
      const run=[];
      while(i<els.length&&els[i].classList.contains('t-varAssign'))run.push(els[i++]);
      if(run.length===1){out.push(run[0]);continue}
      const wrap=document.createElement('div');wrap.className='tree-node t-varAssign';
      const hdr=document.createElement('div');hdr.className='nrow';
      const tog=document.createElement('span');tog.className='ntog';tog.textContent='▶';
      const ic=document.createElement('span');ic.className='nic';ic.textContent='≔';
      const bd=document.createElement('span');bd.className='nbadge bg-var';bd.textContent='vars';
      const sg=document.createElement('span');sg.className='nsig';sg.textContent=` ${run.length} assignments`;
      hdr.appendChild(tog);hdr.appendChild(ic);hdr.appendChild(bd);hdr.appendChild(sg);
      const body=document.createElement('div');body.className='nchildren';body.style.display='none';
      run.forEach(r=>body.appendChild(r));
      hdr.addEventListener('click',e=>{
        e.stopPropagation();
        const open=body.style.display!=='none';
        body.style.display=open?'none':'block';
        tog.textContent=open?'▶':'▼';
      });
      wrap.appendChild(hdr);wrap.appendChild(body);
      out.push(wrap);
    }
    return out;
  }

  function buildNode(node,tab,hls,gapAfter=''){
    if (!nodeVisible(node)) return null;
    const cfg=TCFG[node.type]||TCFG.other;
    const childMeta=node.children.map((c,i)=>{
      const next=node.children[i+1];
      const gap=(S.showTiming&&next&&c.endNs>0&&next.ns>c.endNs)?fmtDur(next.ns-c.endNs):'';
      return{c,gap};
    });
    const visibleKids=[];
    for (const {c,gap} of childMeta){const el=buildNode(c,tab,hls,gap);if(el)visibleKids.push(el)}
    const wrap=document.createElement('div');wrap.className=`tree-node t-${node.type}`;
    const row=document.createElement('div');row.className='nrow';row.dataset.ns=node.ns;row.dataset.id=node.id;
    const tog=document.createElement('span');
    tog.className=`ntog ${visibleKids.length?(node.expanded?'open':''):''}`;
    tog.textContent=visibleKids.length?(node.expanded?'▼':'▶'):'·';
    row.appendChild(tog);
    const ic=document.createElement('span');ic.className='nic';ic.textContent=cfg.ic;row.appendChild(ic);
    if (cfg.badge){const bd=document.createElement('span');bd.className=`nbadge ${cfg.bc}`;bd.textContent=cfg.badge;row.appendChild(bd)}
    if (node.cls){const cn=document.createElement('span');cn.className='ncls';cn.dataset.raw=node.cls+'.';cn.innerHTML=applyHl(node.cls+'.',hls);row.appendChild(cn)}
    const mn=document.createElement('span');mn.className='nmeth';mn.dataset.raw=node.meth;mn.innerHTML=applyHl(node.meth,hls);row.appendChild(mn);
    if (node.params!==undefined&&node.params!==null&&node.params!==''){
      const ps=document.createElement('span');ps.className='nparams';ps.dataset.raw=node.params;
      ps.innerHTML='('+applyHl(node.params,hls)+')';row.appendChild(ps);
    } else if (node.sig){
      const rawSig=node.sig.length>90?node.sig.slice(0,90)+'…':node.sig;
      const sg=document.createElement('span');sg.className='nsig';sg.title=node.sig;sg.dataset.raw=rawSig;
      sg.innerHTML=applyHl(rawSig,hls);row.appendChild(sg);
    }
    if (node.rowCount){const rc=document.createElement('span');rc.className='nsig';rc.style.color='#39d353';rc.textContent=` → ${node.rowCount} rows`;row.appendChild(rc)}
    if (node.calloutResp){const cr=document.createElement('span');cr.className='nsig';cr.textContent=` ← ${node.calloutResp}`;row.appendChild(cr)}
    if (node.lr&&node.lr!=='[EXTERNAL]'){const ln=document.createElement('span');ln.className='nln';ln.textContent=node.lr;row.appendChild(ln)}
    const dur=fmtDur(node.dur);
    if (dur){const dd=document.createElement('span');dd.className='ndur';dd.textContent=dur;row.appendChild(dd)}
    if (gapAfter&&S.showTiming){const g=document.createElement('span');g.className='ngap-inline';g.textContent=`+${gapAfter}`;row.appendChild(g)}
    if (node.cls){
      row.dataset.snippetCls=node.cls;
      if (node.lr&&node.lr!=='[EXTERNAL]') row.dataset.snippetLr=node.lr;
      const srcBtn=document.createElement('span');
      srcBtn.className='nsrc-btn';srcBtn.textContent='⌗';srcBtn.title='View source';
      srcBtn.addEventListener('click',e=>{e.stopPropagation();showSnippet(node.cls,node.lr&&node.lr!=='[EXTERNAL]'?node.lr:'',row)});
      row.appendChild(srcBtn);
    }
    wrap.appendChild(row);
    if (visibleKids.length){
      const kids=document.createElement('div');kids.className='nchildren';
      kids.style.display=node.expanded?'block':'none';
      groupVarKids(visibleKids).forEach(k=>kids.appendChild(k));
      wrap.appendChild(kids);
      row.addEventListener('click',e=>{
        e.stopPropagation();
        const open=kids.style.display!=='none';
        kids.style.display=open?'none':'block';
        tog.textContent=open?'▶':'▼';
        node.expanded=!open;
        syncTreeToLog(tab,node.ns);
        $$('.nrow.active').forEach(el=>el.classList.remove('active'));
        row.classList.add('active');
      });
    } else {
      row.addEventListener('click',e=>{
        e.stopPropagation();
        syncTreeToLog(tab,node.ns);
        $$('.nrow.active').forEach(el=>el.classList.remove('active'));
        row.classList.add('active');
      });
    }
    return wrap;
  }

  // ── Tab manager ────────────────────────────────────────────────────────────
  function addTab(id,name,raw){
    const tab={id:id||`t${++tabSeq}`,name:name||'Log '+tabSeq,raw,parsed:false,
      logLines:[],tree:null,stats:{},namespaces:new Set()};
    S.tabs.push(tab);
    renderTabBar();
    switchTab(tab.id);
    if (raw) parseTab(tab);
  }

  function closeTab(id,e){
    e&&e.stopPropagation();
    const i=S.tabs.findIndex(t=>t.id===id);
    if (i<0) return;
    S.tabs.splice(i,1);
    if (S.activeId===id) S.activeId=S.tabs.length?S.tabs[Math.max(0,i-1)].id:null;
    renderTabBar();
    if (S.activeId) switchTab(S.activeId); else renderEmpty();
  }

  function switchTab(id){
    S.activeId=id;
    renderTabBar();
    const tab=S.tabs.find(t=>t.id===id);
    if (!tab) return;
    if (tab.parsed) renderParsedTab(tab); else renderInputTab(tab);
  }

  function renderTabBar(){
    const bar=$('tabBar');
    bar.innerHTML='';
    S.tabs.forEach(tab=>{
      const btn=document.createElement('div');
      btn.className='tab'+(tab.id===S.activeId?' active':'');
      btn.textContent=tab.name;
      btn.addEventListener('click',()=>switchTab(tab.id));
      const x=document.createElement('button');x.className='tab-x';x.textContent='×';
      x.addEventListener('click',e=>closeTab(tab.id,e));
      btn.appendChild(x);bar.appendChild(btn);
    });
    const add=document.createElement('button');
    add.className='tab-add';add.textContent='＋';add.title='New tab';
    add.addEventListener('click',()=>addTab(null,'Untitled',''));
    bar.appendChild(add);
  }

  function renderInputTab(tab){
    const logPane=$('logPane');
    logPane.innerHTML='';
    const wrap=document.createElement('div');wrap.className='log-input-wrap';
    const ta=document.createElement('textarea');ta.className='log-textarea';
    ta.id='logTA_'+tab.id;ta.placeholder='Paste Salesforce debug log here…';
    ta.value=tab.raw||'';
    wrap.appendChild(ta);
    const btnRow=document.createElement('div');btnRow.className='btn-row';
    const parseBtn=document.createElement('button');parseBtn.className='btn btn-primary';
    parseBtn.textContent='Parse Log';parseBtn.title='Parse the pasted log into a call tree';parseBtn.addEventListener('click',parseActiveTab);
    const sampleBtn=document.createElement('button');sampleBtn.className='btn';
    sampleBtn.textContent='Sample';sampleBtn.title='Fill the editor with an example Apex debug log';sampleBtn.addEventListener('click',loadSample);
    const status=document.createElement('span');status.id='parseStatus';
    status.style.cssText='font-size:11px;color:var(--dm)';
    if (tab.raw&&tab.raw.length>RAW_INLINE_LIMIT) status.textContent=`${(tab.raw.length/1024/1024).toFixed(1)} MB ready — click Parse Log`;
    btnRow.appendChild(parseBtn);btnRow.appendChild(sampleBtn);btnRow.appendChild(status);
    wrap.appendChild(btnRow);logPane.appendChild(wrap);
    $('treePaneHdr').style.display='none';
    $('treeControls').style.display='none';
    $('treeContent').innerHTML='<div class="empty"><div class="ico">📋</div><p>Click Parse Log to visualize the call stack</p></div>';
    $('statsBar').style.display='none';
  }

  async function parseActiveTab(){
    const tab=S.tabs.find(t=>t.id===S.activeId);
    if (!tab) return;
    const ta=$('logTA_'+tab.id);
    if (ta) tab.raw=ta.value;
    if (!tab.raw.trim()){const ps=$('parseStatus');if(ps)ps.textContent='Paste a log first.';return}
    await parseTab(tab);
    saveToHistory(tab);
  }

  function showParseProgress(tab,pct){
    const logPane=$('logPane');
    let wrap=logPane.querySelector('.parse-progress-wrap');
    if (!wrap){
      logPane.innerHTML='';
      wrap=document.createElement('div');wrap.className='parse-progress-wrap';
      const label=document.createElement('div');label.className='parse-progress-label';
      label.textContent='Parsing log…';
      const bar=document.createElement('div');bar.className='parse-progress-bar';
      const fill=document.createElement('div');fill.className='parse-progress-fill';fill.style.width='0%';
      bar.appendChild(fill);
      const pctEl=document.createElement('div');pctEl.className='parse-progress-pct';pctEl.textContent='0%';
      wrap.appendChild(label);wrap.appendChild(bar);wrap.appendChild(pctEl);
      logPane.appendChild(wrap);
    }
    const fill=wrap.querySelector('.parse-progress-fill');
    const pctEl=wrap.querySelector('.parse-progress-pct');
    const p=Math.round(pct*100);
    if(fill)fill.style.width=p+'%';
    if(pctEl)pctEl.textContent=p+'%';
  }

  function parseWithWorker(text, onProgress){
    return new Promise((resolve,reject)=>{
      let src;
      try { src=buildWorkerSrc(); } catch(e){ return reject(e); }
      const blob=new Blob([src],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      const w=new Worker(url);
      w.onmessage=function(e){
        const d=e.data;
        if(d.t==='p'){ onProgress&&onProgress(d.p); return; }
        if(d.t==='done'){
          URL.revokeObjectURL(url);
          w.terminate();
          resolve({
            logLines:d.lls,
            tree:d.tree,
            stats:d.stats,
            namespaces:new Set(d.ns),
            eventTypes:new Map(d.evts)
          });
        }
      };
      w.onerror=function(e){
        URL.revokeObjectURL(url);
        w.terminate();
        reject(e);
      };
      w.postMessage(text);
    });
  }

  async function parseTab(tab){
    showParseProgress(tab,0);
    let result;
    try {
      result=await parseWithWorker(tab.raw,pct=>showParseProgress(tab,pct));
    } catch(_){
      result=await parseLogAsync(tab.raw,pct=>showParseProgress(tab,pct));
    }
    tab.logLines=result.logLines;tab.tree=result.tree;tab.stats=result.stats;
    tab.namespaces=result.namespaces;tab.eventTypes=result.eventTypes;tab.parsed=true;
    tagLineNamespaces(tab.logLines);
    tab._foldableMap=buildFoldableMap(tab.tree,tab.logLines);
    tab._hasFolds=false;
    // collect any namespaces the parser missed (e.g. || empty-field format)
    tab.logLines.forEach(ll=>{if(ll.nsTag)tab.namespaces.add(ll.nsTag);});
    renderParsedTab(tab);
  }

  // ── Highlight system ───────────────────────────────────────────────────────
  function navigateHighlight(h,dir){
    const tab=S.tabs.find(t=>t.id===S.activeId);
    if (!tab||!tab._logScroller||!h.query.trim()) return;
    const vis=tab._visLines||[];
    if (!vis.length) return;
    const q=h.query.toLowerCase();
    const cur=tab._cursorVisIdx??-1;
    let idx=-1;
    if (dir==='down'){
      // search forward from cur+1, wrapping
      for (let i=1;i<=vis.length;i++){
        const c=(cur+i)%vis.length;
        if (vis[c].raw.toLowerCase().includes(q)){idx=c;break}
      }
    } else {
      // search backward from cur-1, wrapping
      for (let i=1;i<=vis.length;i++){
        const c=(cur-i+vis.length)%vis.length;
        if (vis[c].raw.toLowerCase().includes(q)){idx=c;break}
      }
    }
    if (idx>=0) moveLogCursor(tab,idx);
  }

  function renderHlSlots(){
    const wrap=$('hlSlots');wrap.innerHTML='';
    _hlCountRefreshers=[];
    S.highlights.forEach(h=>{
      const slot=document.createElement('div');slot.className='hl-slot';
      slot.style.borderColor=h.query?h.border:'var(--bd)';
      if (h.query) slot.classList.add('active-slot');
      const dot=document.createElement('div');dot.className='hl-dot';
      dot.style.background=h.query?h.bg:'var(--b3)';
      dot.style.border=`2px solid ${h.border}`;dot.title='Click to cycle color';
      dot.addEventListener('click',()=>{});
      const inp=document.createElement('input');inp.className='hl-input';
      inp.value=h.query;inp.placeholder=`H${h.id}`;
      const cnt=document.createElement('span');cnt.className='hl-count';
      function refreshCount(){
        if (!h.query.trim()){cnt.textContent='';return}
        const tab=S.tabs.find(t=>t.id===S.activeId);
        const vis=tab?._visLines||(tab?.logLines)||[];
        const q=h.query.toLowerCase();
        cnt.textContent=vis.filter(ll=>ll.raw.toLowerCase().includes(q)).length;
      }
      _hlCountRefreshers.push(refreshCount);
      refreshCount();
      const applyHlInput=()=>{
        h.query=inp.value;
        slot.style.borderColor=h.query?h.border:'var(--bd)';
        dot.style.background=h.query?h.bg:'var(--b3)';
        slot.classList.toggle('active-slot',!!h.query);

      };
      inp.addEventListener('blur',applyHlInput);
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();applyHlInput()}});
      const navUp=document.createElement('button');navUp.className='hl-nav';navUp.textContent='▲';
      navUp.title=`Previous H${h.id} match`;
      navUp.addEventListener('click',()=>navigateHighlight(h,'up'));
      const navDn=document.createElement('button');navDn.className='hl-nav';navDn.textContent='▼';
      navDn.title=`Next H${h.id} match`;
      navDn.addEventListener('click',()=>navigateHighlight(h,'down'));

      clr.addEventListener('click',()=>{h.query='';inp.value='';slot.style.borderColor='var(--bd)';dot.style.background='var(--b3)';slot.classList.remove('active-slot');refreshCount();rerenderHighlights()});
      slot.appendChild(dot);slot.appendChild(inp);slot.appendChild(cnt);slot.appendChild(navUp);slot.appendChild(navDn);slot.appendChild(clr);wrap.appendChild(slot);
    });
  }

  // ── Global search ──────────────────────────────────────────────────────────
  function onGlobalSearch(){
    const q=$('globalSearch').value.trim().toLowerCase();
    const res=$('gsResults');
    if (!q||q.length<2){res.style.display='none';return}
    const matches=[];
    S.tabs.forEach(tab=>{
      if (!tab.parsed) return;
      tab.logLines.forEach(ll=>{
        if (matches.length>=30) return;
        if (ll.raw.toLowerCase().includes(q)) matches.push({tab,ll});
      });
    });
    if (!matches.length){res.style.display='none';return}
    res.style.display='block';res.innerHTML='';
    matches.forEach(({tab,ll})=>{
      const row=document.createElement('div');row.className='gs-row';
      const gs=document.createElement('span');gs.className='gs-tab';gs.textContent=`[${tab.name}]`;
      const gt=document.createElement('span');gt.className='gs-text';gt.textContent=ll.raw.slice(0,100);
      row.appendChild(gs);row.appendChild(gt);
      row.addEventListener('click',()=>{
        res.style.display='none';switchTab(tab.id);
        setTimeout(()=>{
          const logEl=C.querySelector('#logRendered_'+tab.id);
          const lineEl=logEl?.querySelector(`.ll[data-ns="${ll.ns}"]`);
          if (lineEl){lineEl.classList.add('active');lineEl.scrollIntoView({block:'center'})}
        },50);
      });
      res.appendChild(row);
    });
  }

  // ── History ────────────────────────────────────────────────────────────────
  const LS_KEY='sf-log-hist';const MAX_LS=4*1024*1024;
  function getHistory(){try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]')}catch{return[]}}
  function saveToHistory(tab){
    if (!tab.raw) return;
    const hist=getHistory();
    const existing=hist.findIndex(h=>h.raw===tab.raw);
    if (existing>=0) hist.splice(existing,1);
    hist.unshift({id:Date.now(),name:tab.name,date:new Date().toISOString(),size:tab.raw.length,raw:tab.raw});
    let total=hist.reduce((s,h)=>s+h.size,0);
    while (total>MAX_LS&&hist.length>1){total-=hist.pop().size}
    try{localStorage.setItem(LS_KEY,JSON.stringify(hist))}catch(e){console.warn('Storage full',e)}
  }
  function deleteHistory(id){
    const hist=getHistory().filter(h=>h.id!==id);
    localStorage.setItem(LS_KEY,JSON.stringify(hist));
    renderHistoryPanel();
  }
  function loadFromHistory(h){addTab(null,h.name,h.raw);toggleHistory()}
  function renderHistoryPanel(){
    const hist=getHistory(),list=$('histList');
    const total=hist.reduce((s,h)=>s+h.size,0);
    const kb=(total/1024).toFixed(1),pct=Math.round(total/MAX_LS*100),warn=total>MAX_LS*0.75;
    $('histSize').innerHTML=`<span class="${warn?'hist-size-warn':''}">${kb}KB / ${(MAX_LS/1024).toFixed(0)}KB (${pct}%)</span>`;
    if (!hist.length){list.innerHTML='<div style="padding:12px;font-size:12px;color:var(--vd)">No saved logs</div>';return}
    list.innerHTML='';
    hist.forEach(h=>{
      const item=document.createElement('div');item.className='hist-item';
      const row=document.createElement('div');row.className='hist-item-row';
      const name=document.createElement('div');name.className='hist-item-name';name.textContent=h.name;
      const del=document.createElement('button');del.className='hist-del';del.textContent='🗑';
      del.addEventListener('click',e=>{deleteHistory(h.id);e.stopPropagation()});
      const meta=document.createElement('div');meta.className='hist-item-meta';
      meta.textContent=`${new Date(h.date).toLocaleString()} · ${(h.size/1024).toFixed(1)}KB`;
      row.appendChild(name);row.appendChild(del);
      item.appendChild(row);item.appendChild(meta);
      item.addEventListener('click',()=>loadFromHistory(h));
      list.appendChild(item);
    });
  }
  function toggleHistory(){
    const panel=$('histPanel');panel.classList.toggle('open');
    if (panel.classList.contains('open')) renderHistoryPanel();
  }

  // ── Source folder ──────────────────────────────────────────────────────────
  let _srcFileMap = new Map(); // simpleCls.toLowerCase() -> FileSystemFileHandle | {_rawFile}
  let _srcFolderName = '';
  let _srcScanScope = 'force-app';

  async function walkDirForSrc(dh, underForceApp=false) {
    try {
      for await (const [name, h] of dh.entries()) {
        try {
          if (h.kind==='directory')
            await walkDirForSrc(h, underForceApp || name.toLowerCase()==='force-app');
          else if (h.kind==='file' && underForceApp && /\.(cls|trigger)$/i.test(name))
            _srcFileMap.set(name.replace(/\.(cls|trigger)$/i,'').toLowerCase(), h);
        } catch(_){}
      }
    } catch(_){}
  }

  async function walkDirForAllApex(dh) {
    try {
      for await (const [name, h] of dh.entries()) {
        try {
          if (h.kind==='directory') {
            await walkDirForAllApex(h);
          } else if (h.kind==='file' && /\.(cls|trigger)$/i.test(name)) {
            _srcFileMap.set(name.replace(/\.(cls|trigger)$/i,'').toLowerCase(), h);
          }
        } catch(_){ }
      }
    } catch(_){ }
  }

  async function openSourceFolder() {
    if (window.showDirectoryPicker) {
      try {
        const dh=await window.showDirectoryPicker({mode:'read'});
        _srcFileMap.clear();_bodyCache.clear();
        _srcScanScope='force-app';
        const startInScope = dh.name.toLowerCase()==='force-app';
        await walkDirForSrc(dh, startInScope);
        if (_srcFileMap.size===0) {
          _srcScanScope='selected-folder';
          await walkDirForAllApex(dh);
        }
        _srcFolderName=dh.name;
        updateSrcFolderUI();
      } catch(e){if(e.name!=='AbortError')console.error(e);}
    } else {
      $('srcFolderFallback').click();
    }
  }

  function updateSrcFolderUI() {
    const el=$('srcFolderName');if(!el)return;
    if (_srcFolderName){
      el.textContent=_srcFolderName;
      const scopeLabel=_srcScanScope==='force-app'?'under force-app':'in selected folder scope';
      el.title=`${_srcFileMap.size} Apex files found ${scopeLabel} in "${_srcFolderName}"`;
    } else {el.textContent='';el.title='';}
  }

  async function readSrcFile(cls) {
    const parts = cls.split('.').filter(Boolean);
    for (let i = parts.length - 1; i >= 0; i--) {
      const h = _srcFileMap.get(parts[i].toLowerCase());
      if (h) { const f=h._rawFile||await h.getFile(); return f.text(); }
    }
    // Return debug info so the user can see what was tried vs what's in the map
    const tried = parts.map(p=>p+'.cls').join(', ');
    const sample = [..._srcFileMap.keys()].slice(0,8).map(k=>k+'.cls').join(', ');
    return {_notFound:true, tried, sample, total:_srcFileMap.size};
  }

  $('btn-openSrc').addEventListener('click', openSourceFolder);
  const _srcFallback=$('srcFolderFallback');
  if (_srcFallback) {
    _srcFallback.addEventListener('change',()=>{
      _srcFileMap.clear();_bodyCache.clear();
      const allApex=[];
      const forceAppApex=[];
      for (const f of _srcFallback.files){
        const path=(f.webkitRelativePath||f.name).replace(/\\/g,'/');
        if (/\.(cls|trigger)$/i.test(f.name)) {
          allApex.push(f);
          if (/(?:^|\/)force-app\//i.test(path)||/^force-app\//i.test(path)) forceAppApex.push(f);
        }
      }
      const srcList=forceAppApex.length?forceAppApex:allApex;
      _srcScanScope=forceAppApex.length?'force-app':'selected-folder';
      for (const f of srcList){
        _srcFileMap.set(f.name.replace(/\.(cls|trigger)$/i,'').toLowerCase(),{_rawFile:f});
      }
      if (_srcFallback.files.length){_srcFolderName='Loaded files';updateSrcFolderUI();}
      _srcFallback.value='';
    });
  }

  // ── Code snippet popup ─────────────────────────────────────────────────────
  const _bodyCache = new Map();
  let _snippetEl = null;

  function apexHL(code) {
    const kw = /\b(public|private|protected|global|static|final|abstract|virtual|override|with sharing|without sharing|inherited sharing|class|interface|enum|extends|implements|return|void|null|true|false|new|this|super|if|else|for|while|do|try|catch|finally|throw|break|continue|instanceof|trigger|on|before|after|insert|update|delete|undelete|merge|and|or|not|in|like|from|where|order by|group by|having|limit|offset|select)\b/g;
    const tokens = [];
    let i = 0;
    const src = code;
    while (i < src.length) {
      if (src[i]==='/'&&src[i+1]==='/') {
        const end=src.indexOf('\n',i);const e=end<0?src.length:end;
        tokens.push(`<span class="sc-cmt">${esc(src.slice(i,e))}</span>`);i=e;continue;
      }
      if (src[i]==='/'&&src[i+1]==='*') {
        const end=src.indexOf('*/',i+2);const e=end<0?src.length:end+2;
        tokens.push(`<span class="sc-cmt">${esc(src.slice(i,e))}</span>`);i=e;continue;
      }
      if (src[i]==="'") {
        let j=i+1;while(j<src.length&&(src[j]!=="'"||src[j-1]==='\\'))j++;j++;
        tokens.push(`<span class="sc-str">${esc(src.slice(i,j))}</span>`);i=j;continue;
      }
      if (src[i]==='@') {
        let j=i+1;while(j<src.length&&/\w/.test(src[j]))j++;
        tokens.push(`<span class="sc-ann">${esc(src.slice(i,j))}</span>`);i=j;continue;
      }
      if (/\d/.test(src[i])) {
        let j=i;while(j<src.length&&/[\d.]/.test(src[j]))j++;
        tokens.push(`<span class="sc-num">${esc(src.slice(i,j))}</span>`);i=j;continue;
      }
      if (/[a-zA-Z_]/.test(src[i])) {
        let j=i;while(j<src.length&&/\w/.test(src[j]))j++;
        const word=src.slice(i,j);
        const isKw=kw.test(word);kw.lastIndex=0;
        if (isKw) tokens.push(`<span class="sc-kw">${esc(word)}</span>`);
        else tokens.push(esc(word));
        i=j;continue;
      }
      tokens.push(esc(src[i]));i++;
    }
    return tokens.join('');
  }

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

  function parseLineNum(lr) {
    if (!lr) return null;
    const m = lr.match(/\[(\d+)\]/);
    return m ? parseInt(m[1], 10) : null;
  }

  function closeSnippet() {
    if (_snippetEl) { _snippetEl.remove(); _snippetEl = null; }
  }

  function showSnippet(cls, lr, anchorEl) {
    if (!cls) return;
    const lineNum = parseLineNum(lr);
    closeSnippet();

    const pop = document.createElement('div');
    pop.className = 'snippet-popup';

    const hdr = document.createElement('div');
    hdr.className = 'snippet-hdr';
    hdr.innerHTML = `<span class="snippet-cls">${esc(cls)}</span>`
      + (lineNum ? `<span style="color:var(--vd)">:</span><span class="snippet-ln">${lineNum}</span>` : '')
      + `<button class="snippet-close" title="Close">✕</button>`;
    hdr.querySelector('.snippet-close').addEventListener('click', closeSnippet);

    const body = document.createElement('div');
    body.className = 'snippet-body';
    pop.appendChild(hdr); pop.appendChild(body);

    const overlay = document.createElement('div');
    overlay.className = 'snippet-overlay';
    overlay.appendChild(pop);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeSnippet(); });
    C.appendChild(overlay);
    _snippetEl = overlay;

    if (!_srcFileMap.size) {
      body.innerHTML = '<div class="snippet-error" style="display:flex;flex-direction:column;gap:8px;align-items:flex-start">No project folder open.<button class="btn btn-sm" id="snippetOpenFolderBtn" style="margin-top:2px" title="Open your source project folder so code snippets can be shown">📂 Open Source Folder</button></div>';
      body.querySelector('#snippetOpenFolderBtn').addEventListener('click',()=>{closeSnippet();openSourceFolder();});
      return;
    }

    body.innerHTML = '<div class="snippet-loading"><div class="snippet-spinner" aria-hidden="true"></div><div>Loading source file…</div></div>';
    const renderHtml = (html) => {
      body.innerHTML = html;
      const target = body.querySelector('.sline-target');
      if (target) target.scrollIntoView({ block: 'center' });
    };
    const buildHtml = (src) => {
      if (!src || src?._notFound) {
        const info = src?._notFound ? `<div style="margin-top:6px;color:#768390;font-size:10px">Tried: ${esc(src.tried)}<br>Folder has ${src.total} files, e.g.: ${esc(src.sample)}</div>` : '';
        return `<div class="snippet-error"><b>${esc(cls)}</b> not found in project folder${info}</div>`;
      }
      const lines = src.split('\n');
      let html = '';
      for (let i = 0; i < lines.length; i++)
        html += `<div class="sline${i+1===lineNum?' sline-target':''}"><span class="sline-num">${i+1}</span><span class="sline-code">${apexHL(lines[i])}</span></div>`;
      return html;
    };
    if (_bodyCache.has(cls)) {
      renderHtml(_bodyCache.get(cls));
    } else {
      readSrcFile(cls).then(src => {
        const html = buildHtml(src);
        if (!src?._notFound) _bodyCache.set(cls, html);
        renderHtml(html);
      }).catch(() => {
        body.innerHTML = '<div class="snippet-error">Failed to read source file</div>';
      });
    }
  }

  document.addEventListener('click', e => {
    // snippet closes via its own overlay click handler
  }, true);

  // ── Sample log ─────────────────────────────────────────────────────────────
  function loadSample(){
    const ta=$('logTA_'+S.activeId);
    if (ta) ta.value=`09:00:00.1 (100000)|EXECUTION_STARTED
09:00:00.2 (200000)|CODE_UNIT_STARTED|[EXTERNAL]|execute_anonymous_apex
09:00:00.3 (300000)|METHOD_ENTRY|[1]|01pAB00000001AAA|pse__AccountService.processAccounts(List<Id>)
09:00:00.4 (400000)|USER_DEBUG|[3]|DEBUG|Processing batch: 5 accounts

09:00:00.6 (600000)|SOQL_EXECUTE_BEGIN|[12]|Aggregations:0

09:00:01.7 (3000000)|CODE_UNIT_FINISHED|execute_anonymous_apex
09:00:01.8 (3100000)|EXECUTION_FINISHED`;
  }

  // ── Event wiring ───────────────────────────────────────────────────────────
  $('globalSearch').addEventListener('input', onGlobalSearch);
  $('hideInput').addEventListener('keydown', e=>{if(e.key==='Enter')addHideKeyword()});
  $('btn-addHide').addEventListener('click', addHideKeyword);
  $('btn-history').addEventListener('click', toggleHistory);
  $('btn-copyLog').addEventListener('click', async () => {
    const tab=getActiveTab();
    const text=tab?.raw||'';
    const btn=$('btn-copyLog');
    if(!text.trim()){btn.textContent='Nothing to copy';setTimeout(()=>{btn.textContent='⎘ Copy Log';},1200);return;}
    const ok=await copyTextToClipboard(text);
    btn.textContent=ok?'✓ Copied':'Copy failed';
    setTimeout(()=>{btn.textContent='⎘ Copy Log';},1200);
  });
  $('btn-addTab').addEventListener('click', ()=>addTab(null,'Untitled',''));
  $('btn-closeHist').addEventListener('click', toggleHistory);
  $('btn-hideTree').addEventListener('click', hideTreePane);
  $('togDebug').addEventListener('click', ()=>toggleOpt('showDebug',$('togDebug')));
  $('togSys').addEventListener('click', ()=>toggleOpt('showSystem',$('togSys')));
  $('togVarAssign').addEventListener('click', ()=>{
    S.showVarAssign=!S.showVarAssign;
    $('togVarAssign').classList.toggle('on',S.showVarAssign);
    C.classList.toggle('hide-vars',!S.showVarAssign);
  });
  $('togTiming').addEventListener('click', ()=>toggleOpt('showTiming',$('togTiming')));
  $('nsBtn').addEventListener('click', toggleNsPopup);
  $('logTagsBtn').addEventListener('click', toggleLogTagsPopup);
  $('treeSearchBox').addEventListener('keydown', e=>{
    if (e.key==='Enter'||e.key==='Escape'){
      S.treeSearch=e.key==='Escape'?'':e.target.value;
      e.target.value=S.treeSearch;rerender();
    }
  });
  $('treeSearchBox').addEventListener('blur', e=>{S.treeSearch=e.target.value;rerender()});
  $('btn-expandAll').addEventListener('click', expandAll);
  $('btn-collapseAll').addEventListener('click', collapseAll);
  $('treeControls').addEventListener('click', e=>{
    const chip=e.target.closest('[data-f]');if(chip)setTypeFilter(chip);
  });
  C.addEventListener('click', e=>{
    if (!e.target.closest('.ns-wrap')){
      $('nsPopup').classList.remove('open');
      $('logTagsPopup').classList.remove('open');
    }
    if (!e.target.closest('.ns-log-popup')&&!e.target.closest('[title="Hide namespaces from log"]')){
      document.querySelectorAll('.ns-log-popup.open').forEach(p=>p.classList.remove('open'));
    }
    if (!e.target.closest('.gs-wrap')) $('gsResults').style.display='none';
  });

  // ── Split pane (vertical drag) ─────────────────────────────────────────────
  (()=>{
    let dragging=false,startX=0,startW=0;
    const div=$('vdivider');
    div.addEventListener('mousedown',e=>{
      dragging=true;startX=e.clientX;
      startW=$('logPane').getBoundingClientRect().width;
      e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if (!dragging) return;
      const delta=e.clientX-startX;
      const total=$('splitWrap').getBoundingClientRect().width;
      const newW=Math.max(180,Math.min(total-180,startW+delta));
      C.style.setProperty('--log-w',newW+'px');
    });
    document.addEventListener('mouseup',()=>{dragging=false});
  })();

  // ── Drag & drop ────────────────────────────────────────────────────────────
  const dropOverlay=$('dropOverlay');
  document.addEventListener('dragover',e=>{
    e.preventDefault();
    const hasText=e.dataTransfer.types&&(e.dataTransfer.types.includes('text/plain')||e.dataTransfer.types.includes('Text'));
    dropOverlay.textContent=hasText?'Drop to open as log':'Drop log file(s) to open';
    dropOverlay.classList.add('show');
  });
  document.addEventListener('dragleave',e=>{if(!e.relatedTarget)dropOverlay.classList.remove('show')});
  document.addEventListener('drop',e=>{
    e.preventDefault();dropOverlay.classList.remove('show');
    const files=[...e.dataTransfer.files];
    if (files.length){
      files.forEach(f=>{
        const reader=new FileReader();
        reader.onload=ev=>addTab(null,f.name,ev.target.result);
        reader.readAsText(f);
      });
      return;
    }
    // plain-text drag from other apps (selected text, terminal output, etc.)
    const text=e.dataTransfer.getData('text/plain')||e.dataTransfer.getData('Text');
    if (text&&text.trim()) addTab(null,'Dropped log',text.trim());
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  // Delegated right-click handler for tree snippet — catches clicks on any
  // child span (class name, method name, etc.) not just the row itself.
  $('treeContent').addEventListener('contextmenu', e => {
    const row = e.target.closest('[data-snippet-cls]');
    if (!row) return;
    e.preventDefault();
    showSnippet(row.dataset.snippetCls, row.dataset.snippetLr||'', row);
  });

  $('btn-help').addEventListener('click',()=>$('helpModal').classList.add('open'));
  $('btn-closeHelp').addEventListener('click',()=>$('helpModal').classList.remove('open'));
  $('btn-helpSample').addEventListener('click',()=>{loadSample();parseActiveTab();$('helpModal').classList.remove('open');});
  $('helpModal').addEventListener('click',e=>{if(e.target===$('helpModal'))$('helpModal').classList.remove('open');});

  renderHlSlots();
  addTab(null,'Log 1','');

  return {
    openLog(name, raw) { addTab(null, name, raw); }
  };
}

}).catch(()=>{});
